<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:var(--font);color:var(--text);background:var(--gray);overflow:hidden;}
.app{display:flex;height:100vh;height:100dvh;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transition:transform .25s cubic-bezier(.4,0,.2,1);}
.s-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.logo-mark{display:flex;align-items:center;gap:10px;}
.logo-r{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:700;}
.logo-tx strong{font-size:14px;font-weight:600;color:var(--blue);display:block;}
.logo-tx span{font-size:11px;color:var(--text3);}
.nav{padding:10px 8px;flex:1;overflow-y:auto;}
.nav-sec{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 4px;}
.ni{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;font-size:13.5px;color:var(--text2);transition:all .15s;margin-bottom:1px;user-select:none;}

.ni.active{background:var(--blue-l);color:var(--blue);font-weight:500;}
.ni-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

.zoom-status.ok{background:var(--green-l);color:#1a6645;display:block;}

<div class="app" id="app">

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG ZOOM — se guarda en localStorage
// ═══════════════════════════════════════════════════════════
const CFG_KEY = 'ra_config';
function getCfg() {
  try { return JSON.parse(localStorage.getItem(CFG_KEY)) || {}; } catch(e){ return {}; }
}
function saveCfg(obj) {
  const c = getCfg();
  localStorage.setItem(CFG_KEY, JSON.stringify({...c, ...obj}));
}

// ═══════════════════════════════════════════════════════════
//  ZOOM API — genera meeting real via tu backend proxy
//  O via Zoom OAuth en el navegador con tu token
// ═══════════════════════════════════════════════════════════
async function crearMeetingZoom(titulo, fecha, hora, duracion) {
  const cfg = getCfg();

  // Modo 1: Server-to-Server OAuth (recomendado, necesita proxy)
  if (cfg.zoomMode === 'server' && cfg.zoomProxyUrl) {
    return await crearMeetingViaProxy(cfg.zoomProxyUrl, cfg.zoomProxySecret, titulo, fecha, hora, duracion);
  }

  // Modo 2: Token personal (JWT o Access Token directo)
  if (cfg.zoomMode === 'token' && cfg.zoomToken) {
    return await crearMeetingConToken(cfg.zoomToken, cfg.zoomEmail, titulo, fecha, hora, duracion);
  }

  // Sin configuración: retorna null (el usuario ingresa link manualmente)
  return null;
}

async function crearMeetingConToken(token, email, titulo, fecha, hora, duracion) {
  const startTime = `${fecha}T${hora}:00`;
  const payload = {
    topic: titulo,
    type: 2,
    start_time: startTime,
    duration: parseInt(duracion) || 60,
    timezone: 'America/Guayaquil',
    settings: {
      host_video: true,
      participant_video: true,
      join_before_host: false,
      mute_upon_entry: true,
      waiting_room: true,
      auto_recording: 'none',
    }
  };

  // CORS proxy para llamadas directas desde el navegador
  const corsProxy = 'https://corsproxy.io/?';
  const zoomUrl = `${corsProxy}${encodeURIComponent(`https://api.zoom.us/v2/users/${email||'me'}/meetings`)}`;

  const resp = await fetch(zoomUrl, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${token}`,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(payload),
  });

  if (!resp.ok) {
    const err = await resp.json().catch(()=>({}));
    throw new Error(err.message || `Error Zoom ${resp.status}`);
  }

  const data = await resp.json();
  return {
    id: data.id,
    link: data.join_url,
    password: data.password,
    start_url: data.start_url,
  };
}

async function crearMeetingViaProxy(proxyUrl, secret, titulo, fecha, hora, duracion) {
  const resp = await fetch(proxyUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-secret': secret || '',
    },
    body: JSON.stringify({ titulo, fecha, hora, duracion }),
  });
  if (!resp.ok) throw new Error(`Proxy error ${resp.status}`);
  return await resp.json();
}

// ═══════════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════════
const MESES = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MESES_F = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const TIPOS = ["Trabajo de Grado","Maquetación de Artículo","Trabajo Académico","Tesis Doctoral","Artículo Científico","Ensayo","Revisión Bibliográfica","Otro"];
const TIPOS_S = ["Asesoría inicial","Revisión de avance","Correcciones","Asesoría metodológica","Entrega de borradores","Entrega final","Seguimiento","Otro"];
const E_MAP = {en_proceso:"En proceso",completado:"Completado",pendiente_pago:"Pendiente pago",cancelado:"Cancelado"};
const Z_MAP = {programada:"Programada",completada:"Completada",cancelada:"Cancelada"};

function loadState() {
  try { const d = localStorage.getItem('ra_state'); return d ? JSON.parse(d) : null; } catch(e){ return null; }
}
function saveState() {
  try { localStorage.setItem('ra_state', JSON.stringify(S)); } catch(e){}
}

const DEFAULT_STATE = {
  page:'dashboard', tabTrabajo:'todos', mesActivo: new Date().getMonth(),
  nextId:1, nextCId:1, nextZId:1,
  trabajos:[], contactos:[], sesiones:[],
};

let S = loadState() || {...DEFAULT_STATE};

// helpers
const getPagado = t => (t.pagos||[]).reduce((s,p)=>s+p.monto,0);
const getPendiente = t => t.total - getPagado(t);
const getPct = t => t.total>0 ? Math.round(getPagado(t)/t.total*100) : 0;
const initials = n => n.split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
const today = () => new Date().toISOString().split('T')[0];
const fDate = d => { if(!d) return '—'; const p=d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; };
const fMoney = n => '$'+(n||0).toLocaleString('es-EC',{minimumFractionDigits:0,maximumFractionDigits:0});
function gEB(e){const m={en_proceso:'b-blue',completado:'b-green',pendiente_pago:'b-amber',cancelado:'b-red'};return `<span class="badge ${m[e]||'b-gray'}">${E_MAP[e]||e}</span>`;}
function gZB(e){const m={programada:'b-zoom',completada:'b-green',cancelada:'b-red'};return `<span class="badge ${m[e]||'b-gray'}">${Z_MAP[e]||e}</span>`;}
function av(n,s=''){return `<div class="av${s?` ${s}`:''}"><span>${initials(n)}</span></div>`;}

// ═══════════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════════
function nav(page) {
  S.page=page; saveState();
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  document.getElementById('nav-'+page)?.classList.add('active');
  const titles={dashboard:'Dashboard',trabajos:'Trabajos',pagos:'Pagos & Cobros',agenda:'Agenda',recordatorios:'Recordatorios WhatsApp',zoom:'Sesiones Zoom',config:'Configuración',sheets:'Google Sheets'};
  document.getElementById('topbar-title').textContent=titles[page]||page;
  const acts={
    trabajos:`<button class="btn btn-p" onclick="openNuevoTrabajo()"><span>+</span><span class="t">Nuevo Trabajo</span></button>`,
    agenda:`<button class="btn btn-p" onclick="openNuevoContacto()"><span>+</span><span class="t">Contacto</span></button>`,
    zoom:`<button class="btn btn-z" onclick="openNuevaSesion()"><span>🎥</span><span class="t">Nueva Sesión</span></button>`,
    dashboard:`<button class="btn btn-p" onclick="openNuevoTrabajo()"><span>+</span><span class="t">Nuevo Trabajo</span></button>`,
    config:'',pagos:'',recordatorios:'',sheets:'',
  };
  document.getElementById('topbar-actions').innerHTML=acts[page]||'';
  updateBadges(); render(); closeSidebar();
}

function updateBadges(){
  const n=S.trabajos.filter(t=>t.estado!=='completado'&&t.estado!=='cancelado'&&getPendiente(t)>0).length;
  const b=document.getElementById('badge-rec');
  if(b){b.textContent=n;b.style.display=n>0?'inline-flex':'none';}
}
function toggleSidebar(){const sb=document.getElementById('sidebar'),bd=document.getElementById('backdrop');sb.classList.toggle('open');bd.style.display=sb.classList.contains('open')?'block':'none';}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('backdrop').style.display='none';}

function render(){

${!zoomOk?`<div class="alert al-amber" style="margin-bottom:16px;">

  <div class="al-body"><strong>Zoom no configurado</strong><span>Configura tu cuenta Zoom para generar meetings automáticamente.</span></div>
  <div class="al-act"><button class="btn btn-sm" onclick="nav('config')">Configurar</button></div>
</div>`:''}
<div class="g4">
  <div class="metric"><div class="ml">Total cobrado</div><div class="mv blue">${fMoney(cobrado)}</div><div class="ms">de ${fMoney(todos.reduce((s,t)=>s+t.total,0))} total</div></div>
  <div class="metric"><div class="ml">Por cobrar</div><div class="mv amber">${fMoney(pendiente)}</div><div class="ms">${todos.filter(t=>t.estado==='pendiente_pago').length} trabajo(s)</div></div>
  <div class="metric"><div class="ml">En proceso</div><div class="mv green">${enProceso}</div><div class="ms">trabajos activos</div></div>
  <div class="metric"><div class="ml">Sesiones Zoom</div><div class="mv zoom">${S.sesiones.filter(s=>s.estado==='programada').length}</div><div class="ms">programadas</div></div>
</div>
${alertas.length>0?`<div class="card"><div class="card-title">⚠️ Vencimientos próximos (30 días)</div>${alertas.map(t=>`<div class="alert al-amber"><span>⏰</span><div class="al-body"><strong>${t.cliente}</strong><span>${t.tipo} · Pendiente: ${fMoney(getPendiente(t))} · Vence: ${fDate(t.fecha_limite)}</span></div><div class="al-act"><button class="btn btn-g btn-sm" onclick="enviarWA('${t.tel}','${t.cliente}',${getPendiente(t)},'${t.fecha_limite}','${t.tipo}')">📱</button><button class="btn btn-sm" onclick="openDetalle(${t.id})">Ver</button></div></div>`).join('')}</div>`:''}
${sesHoy.length>0?`<div class="alert al-blue" style="border-radius:var(--r-lg);border:1px solid var(--border);margin-bottom:16px;"><span>🎥</span><div class="al-body"><strong>${sesHoy.length} sesión(es) Zoom hoy</strong><span>${sesHoy.map(s=>`${s.cliente} a las ${s.hora}`).join(' · ')}</span></div><div class="al-act"><button class="btn btn-z btn-sm" onclick="nav('zoom')">Ver</button></div></div>`:''}
<div class="g2">
  <div class="card"><div class="card-title">Cobros últimos 6 meses</div>
    <div class="bar-w">${mData.map(d=>`<div class="bar" style="height:${Math.round(d.c/maxB*100)}%" title="${fMoney(d.c)}"></div>`).join('')}</div>
    <div class="bls">${mData.map(d=>`<div class="bl">${MESES[d.m]}</div>`).join('')}</div>
  </div>
  <div class="card"><div class="card-title">Próximas sesiones <button class="btn btn-sm btn-z" onclick="nav('zoom')">Ver todas</button></div>
    ${proxS.length===0?`<div class="empty">Sin sesiones próximas</div>`:proxS.map(s=>`<div class="zs"><div class="zdot prox"></div><div class="zt">${fDate(s.fecha)}<br><span style="font-size:10px;">${s.hora}</span></div><div class="zi"><strong>${s.cliente}</strong><span>${s.tipo}</span></div><div class="za"><a href="${s.link}" target="_blank" class="btn btn-z btn-sm">Unirse</a></div></div>`).join('')}
  </div>
</div>`;
}

  const tot=pm.reduce((s,p)=>s+p.monto,0);
  const proy=S.trabajos.filter(t=>t.estado!=='completado'&&t.estado!=='cancelado').reduce((s,t)=>s+getPendiente(t),0);
  const tTotal=S.trabajos.reduce((s,t)=>s+t.total,0);

  return `
<div style="display:flex;align-items:center;gap:5px;margin-bottom:14px;flex-wrap:wrap;">
  <span style="font-size:12px;color:var(--text3);">Mes:</span>
  ${Array.from({length:12},(_,m)=>`<div class="tab${mes===m?' active':''}" onclick="S.mesActivo=${m};render();">${MESES[m]}</div>`).join('')}
</div>
<div class="g3">

${pm.length===0?`<div class="empty">Sin pagos en ${MESES[mes]}</div>`:`

// ── ZOOM ───────────────────────────────────────────────────
function rZoom(){
  const hoy=today();
  const sesHoy=S.sesiones.filter(s=>s.fecha===hoy&&s.estado==='programada');
  const prox=S.sesiones.filter(s=>s.fecha>hoy&&s.estado==='programada').sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const past=S.sesiones.filter(s=>s.fecha<hoy||s.estado==='completada'||s.estado==='cancelada').sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const cfg=getCfg();
  const zoomOk=cfg.zoomMode&&(cfg.zoomToken||cfg.zoomProxyUrl);
  return `
<div class="g3">
  <div class="metric"><div class="ml">Programadas</div><div class="mv zoom">${S.sesiones.filter(s=>s.estado==='programada').length}</div></div>
  <div class="metric"><div class="ml">Completadas</div><div class="mv green">${S.sesiones.filter(s=>s.estado==='completada').length}</div></div>
  <div class="metric"><div class="ml">Hoy</div><div class="mv blue">${sesHoy.length}</div></div>
</div>
${!zoomOk?`<div class="alert al-amber" style="margin-bottom:16px;"><span>⚙️</span><div class="al-body"><strong>Zoom no configurado</strong><span>Sin configuración, el link se genera manualmente. Configura Zoom para generación automática.</span></div><div class="al-act"><button class="btn btn-sm" onclick="nav('config')">Configurar</button></div></div>`:`<div class="alert al-green" style="margin-bottom:16px;"><span>✅</span><div class="al-body"><strong>Zoom conectado</strong><span>Los meetings se generan automáticamente al agendar una sesión.</span></div></div>`}
${sesHoy.length>0?`<div class="card" style="border:2px solid var(--zoom);"><div class="card-title" style="color:var(--zoom);">🎥 Sesiones de hoy</div>${sesHoy.map(s=>zCard(s,'hoy')).join('')}</div>`:''}
<div class="card"><div class="card-title">📅 Próximas sesiones</div>
${prox.length===0?`<div class="empty">Sin sesiones próximas</div>`:prox.map(s=>zCard(s,'prox')).join('')}
</div>
<div class="card"><div class="card-title">📋 Historial</div>
${past.length===0?`<div class="empty">Sin historial</div>`:past.map(s=>zCard(s,'past')).join('')}
</div>`;
}

function zCard(s, tipo) {
  const isHoy=tipo==='hoy', isPast=tipo==='past';
  return `<div class="zs" style="${isPast?'opacity:.65':''}">
<div class="zdot ${tipo==='hoy'?'hoy':tipo==='prox'?'prox':'past'}"></div>
<div class="zt">${fDate(s.fecha)}<br><span style="font-size:10px;">${s.hora} · ${s.duracion}min</span></div>
<div class="zi"><strong>${s.cliente}</strong><span>${s.tipo}${s.notas?` · ${s.notas}`:''}</span></div>
<div class="za">
${isHoy?`<a href="${s.link}" target="_blank" class="btn btn-z btn-sm">🎥 Unirse</a>`:`<a href="${s.link}" target="_blank" class="btn btn-z btn-sm">🔗 Link</a>`}
${!isPast?`<button class="btn btn-g btn-sm" onclick="enviarRdtrZoom(${s.id})">📱</button>`:''}
${!isPast?`<button class="btn btn-sm" onclick="editarSesion(${s.id})">✏️</button>`:''}
${!isPast?`<button class="btn btn-sm" onclick="completarSesion(${s.id},'completada')">✓</button>`:`<button class="btn btn-sm" onclick="completarSesion(${s.id},'programada')">↩️</button>`}
</div></div>`;
}

async function guardarSesion(id) {
  const cli=document.getElementById('z-cli').value;
  const tel=document.getElementById('z-tel').value;
  const tipo=document.getElementById('z-tipo').value;
  const fecha=document.getElementById('z-fecha').value;
  const hora=document.getElementById('z-hora').value;
  const dur=parseInt(document.getElementById('z-dur').value)||60;
  const notas=document.getElementById('z-notas').value;
  const tid=parseInt(document.getElementById('z-tid').value)||null;
  if(!fecha||!hora)return alert('Ingresa fecha y hora');

  // Obtener link manual si existe y Zoom no está configurado
  const linkManualEl=document.getElementById('z-link');
  let linkManual=linkManualEl?linkManualEl.value:'';

  const btn=document.getElementById('btn-guardar-sesion');
  const savingDiv=document.getElementById('zoom-saving');

  // Intentar generar meeting Zoom automáticamente
  let zoomData=null;
  const cfg=getCfg();
  if(cfg.zoomMode&&(cfg.zoomToken||cfg.zoomProxyUrl)){
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Generando...';
    if(savingDiv)savingDiv.style.display='block';
    try{
      const tituloMeeting=`${tipo} — ${cli}`;
      zoomData=await crearMeetingZoom(tituloMeeting,fecha,hora,dur);
    }catch(e){
      console.warn('Zoom API error:',e.message);
      if(savingDiv){savingDiv.textContent=`⚠️ No se pudo generar el meeting Zoom: ${e.message}. Guardando sin link.`;savingDiv.className='zoom-status err';}
    }
    btn.disabled=false;btn.innerHTML='🎥 Guardar';
  }

  const data={
    cliente:cli,tel,tipo,fecha,hora,duracion:dur,notas,tid,estado:'programada',
    link: zoomData?.link || linkManual || 'https://zoom.us/j/000000000',
    zoomId: zoomData?.id || null,
    zoomPassword: zoomData?.password || null,
    zoomStartUrl: zoomData?.start_url || null,
  };

  if(id){const s=S.sesiones.find(x=>x.id===id);Object.assign(s,data);}
  else S.sesiones.push({id:S.nextZId++,...data});

  saveState();closeModal();render();
}

function eliminarSesion(id){if(!confirm('¿Eliminar sesión?'))return;S.sesiones=S.sesiones.filter(s=>s.id!==id);saveState();render();}
function completarSesion(id,e){const s=S.sesiones.find(x=>x.id===id);if(s){s.estado=e;saveState();render();}}

function abrirWA(tel,nombre){window.open(`https://wa.me/${tel.replace(/\D/g,'')}?text=${encodeURIComponent(`Hola ${nombre}! 👋 Te contactamos desde *Research Assesor*.`)}`,'_blank');}
function enviarRdtrZoom(id){const s=S.sesiones.find(x=>x.id===id);if(!s)return;window.open(`https://wa.me/${s.tel.replace(/\D/g,'')}?text=${encodeURIComponent(genMsgZoom(s))}`,'_blank');}
function personalizarMsg(id){
  const t=S.trabajos.find(x=>x.id===id);
  showModal(`<h3>✏️ Personalizar mensaje</h3>
<div class="fi"><label class="fl">Mensaje WhatsApp</label><textarea class="fin" id="msg-c" style="height:180px;">${genMsg(t.cliente,getPendiente(t),t.fecha_limite,t.tipo)}</textarea></div>
<div class="mf"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-g" onclick="enviarWACustom('${t.tel}')">📱 Enviar</button></div>`);
}
function enviarWACustom(tel){window.open(`https://wa.me/${tel.replace(/\D/g,'')}?text=${encodeURIComponent(document.getElementById('msg-c').value)}`,'_blank');closeModal();}

function copiarCSV(tipo){
  const csvs={
    trabajos:()=>{let r='Cliente,Teléfono,Email,Tipo,Título,Total,Pagado,Pendiente,Estado,Fecha Inicio,Fecha Límite,Notas\n';S.trabajos.forEach(t=>{r+=`"${t.cliente}","${t.tel}","${t.email||''}","${t.tipo}","${t.titulo}",${t.total},${getPagado(t)},${getPendiente(t)},"${E_MAP[t.estado]}","${t.fecha_inicio}","${t.fecha_limite}","${t.notas||''}"\n`;});return r;},
    pagos:()=>{let r='Fecha,Cliente,Tipo,Monto,Nota\n';S.trabajos.forEach(t=>(t.pagos||[]).forEach(p=>{r+=`"${p.fecha}","${t.cliente}","${t.tipo}",${p.monto},"${p.nota||''}"\n`;}));return r;},
    sesiones:()=>{let r='Fecha,Hora,Cliente,Tipo,Duración,Link Zoom,Estado,Notas\n';S.sesiones.forEach(s=>{r+=`"${s.fecha}","${s.hora}","${s.cliente}","${s.tipo}",${s.duracion},"${s.link}","${Z_MAP[s.estado]}","${s.notas||''}"\n`;});return r;},
    clientes:()=>{let r='Nombre,Teléfono,Email,Notas\n';S.contactos.forEach(c=>{r+=`"${c.nombre}","${c.tel}","${c.email||''}","${c.notas||''}"\n`;});return r;},
  };
  navigator.clipboard.writeText(csvs[tipo]()).then(()=>{const el=document.getElementById('copy-ok');if(el){el.style.display='block';setTimeout(()=>el.style.display='none',2500);}}).catch(()=>alert('Error al copiar'));
}

function copiarAppsScript(){
  fetch('apps_script_research_assesor.js').then(r=>r.text()).then(t=>navigator.clipboard.writeText(t).then(()=>alert('✅ Script copiado'))).catch(()=>alert('Descarga el archivo .js adjunto y copia su contenido'));
}
function descargarScript(){
  alert('El archivo apps_script_research_assesor.js está incluido en el ZIP descargado junto con la app.');
}

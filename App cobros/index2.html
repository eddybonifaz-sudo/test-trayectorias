const SS_ID = 'TU_SPREADSHEET_ID_AQUI';

// ── doGet: recibe createMeet como GET con query params ──────────────────────
function doGet(e) {
  try {
    const p = e.parameter || {};

    if (p.action === 'createMeet') {
      const cal   = CalendarApp.getDefaultCalendar();
      const title = p.title  || 'Reunión Research Assesor';
      const date  = p.date   || new Date().toISOString().split('T')[0];
      const time  = p.time   || '10:00';
      const dur   = parseInt(p.duration) || 60;
      const [y,mo,d] = date.split('-').map(Number);
      const [h,m]    = (time + ':00').split(':').map(Number);
      const start    = new Date(y, mo-1, d, h, m, 0);
      const end      = new Date(start.getTime() + dur * 60000);

      // Crear evento con Meet usando la API de Calendar
      const resource = {
        summary: title,
        start:   { dateTime: start.toISOString(), timeZone: Session.getScriptTimeZone() },
        end:     { dateTime: end.toISOString(),   timeZone: Session.getScriptTimeZone() },
        conferenceData: {
          createRequest: {
            requestId: 'meet-' + Date.now(),
            conferenceSolutionKey: { type: 'hangoutsMeet' }
          }
        }
      };
      const event = Calendar.Events.insert(resource, 'primary', { conferenceDataVersion: 1 });
      const meetLink = event.conferenceData &&
                       event.conferenceData.entryPoints &&
                       event.conferenceData.entryPoints.find(ep => ep.entryPointType === 'video');
      const link = meetLink ? meetLink.uri : null;
      return jsonp(e, { meetLink: link, eventId: event.id });
    }

    // doGet sin action: devuelve datos de las hojas
    const ss   = SpreadsheetApp.openById(SS_ID);
    const data = {};
    ss.getSheets().forEach(s => {
      const vals = s.getDataRange().getValues();
      if (vals.length < 2) return;
      const headers = vals[0];
      data[s.getName()] = vals.slice(1).map(row =>
        Object.fromEntries(headers.map((h, i) => [h, row[i]]))
      );
    });
    return jsonp(e, data);

  } catch(err) {
    return jsonp(e, { error: err.toString() });
  }
}

// ── doPost: sincronización de datos desde la plataforma ──────────────────────
function doPost(e) {
  try {
    const payload = JSON.parse(e.postData.contents);
    const ss      = SpreadsheetApp.openById(SS_ID);

    if (payload.action === 'syncAll') {
      syncSheet(ss, 'Clientes', payload.clients);
      syncSheet(ss, 'Trabajos', payload.works);
      syncSheet(ss, 'Cuotas',   payload.cuotas);
      return ok({ synced: true });
    }
    return ok({ error: 'Acción no reconocida' });
  } catch(err) {
    return ok({ error: err.toString() });
  }
}

// ── syncSheet: crea/actualiza una hoja con los datos ─────────────────────────
function syncSheet(ss, name, rows) {
  if (!rows || !rows.length) return;
  let sheet = ss.getSheetByName(name);
  if (!sheet) sheet = ss.insertSheet(name);
  sheet.clearContents();
  const headers = Object.keys(rows[0]);
  sheet.getRange(1, 1, 1, headers.length)
    .setValues([headers])
    .setFontWeight('bold')
    .setBackground('#1E6FC8')
    .setFontColor('#FFFFFF');
  const data = rows.map(r => headers.map(h => r[h] ?? ''));
  sheet.getRange(2, 1, data.length, headers.length).setValues(data);
  sheet.setFrozenRows(1);
  sheet.autoResizeColumns(1, headers.length);
}

// jsonp() wraps response for JSONP requests (supports ?callback=fnName)
function jsonp(e, data) {
  const cb = (e && e.parameter && e.parameter.callback) || null;
  const json = JSON.stringify(data);
  if (cb) {
    return ContentService
      .createTextOutput(cb + '(' + json + ')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ok(data);
}

function ok(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

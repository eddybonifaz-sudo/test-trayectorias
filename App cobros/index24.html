<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Research Assesor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh}
.app{display:flex;min-height:100vh}
aside{width:215px;flex-shrink:0;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.logo{padding:16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px}
.logo-sq{width:34px;height:34px;background:#1d4ed8;border-radius:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.logo-tx{font-size:13px;font-weight:800;color:#1d4ed8;line-height:1.2}
.logo-sub{font-size:10px;color:#94a3b8}
nav{padding:8px;flex:1}
.ni{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#475569;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;transition:all .1s}
.ni:hover{background:#eff6ff;color:#1d4ed8}
.ni.on{background:#dbeafe;color:#1d4ed8;font-weight:700}
.foot{padding:12px;border-top:1px solid #e2e8f0}
.fn{font-size:13px;font-weight:700;color:#1e293b}.fr{font-size:11px;color:#94a3b8;margin-bottom:8px}
main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.topbar h2{font-size:15px;font-weight:700;flex:1}
.page{padding:20px;flex:1}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px}
.kpi-i{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.kpi-n{font-size:24px;font-weight:800;line-height:1}.kpi-l{font-size:11px;color:#94a3b8;margin-top:2px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;margin-bottom:16px}
.card-hd{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9}
.card-hd h3{font-size:13px;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 14px;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #f1f5f9;background:#f8faff}
td{padding:10px 14px;border-bottom:1px solid #f8fafc;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8faff}
.empty{text-align:center;padding:32px;color:#94a3b8;font-size:13px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .1s;white-space:nowrap}
.btn:active{opacity:.8}
.btn-p{background:#1d4ed8;color:#fff}.btn-p:hover{background:#1e40af}
.btn-green{background:#059669;color:#fff}
.btn-sm{padding:4px 9px;font-size:12px;border-radius:7px}
.btn-g{background:transparent;color:#475569;border:1px solid #e2e8f0}.btn-g:hover{background:#f0f6ff;color:#1d4ed8}
.btn-r{background:#fee2e2;color:#dc2626;border:1px solid #fecaca}
.btn-wa{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0}
.btn-amber{background:#fef3c7;color:#b45309;border:1px solid #fde68a}
.b{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:#dcfce7;color:#15803d}.bb{background:#dbeafe;color:#1d4ed8}
.ba{background:#fef3c7;color:#b45309}.br{background:#fee2e2;color:#dc2626}.bx{background:#f1f5f9;color:#475569}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:540px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal h3{font-size:15px;font-weight:800;color:#1d4ed8;margin-bottom:18px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg .full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:#475569;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;color:#1e293b;outline:none;transition:border .1s}
input:focus,select:focus,textarea:focus{border-color:#1d4ed8;box-shadow:0 0 0 3px rgba(29,78,216,.1)}
textarea{resize:vertical;min-height:60px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;border-top:1px solid #f1f5f9;padding-top:14px}
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e3a8a,#1d4ed8)}
.lb{background:#fff;border-radius:18px;padding:32px;width:340px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.lb h1{font-size:22px;font-weight:800;color:#1d4ed8;margin-bottom:3px}
.sp{display:flex;align-items:center;gap:7px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600}
.sp-ok{background:#dcfce7;color:#15803d}.sp-ld{background:#fef3c7;color:#b45309}.sp-er{background:#fee2e2;color:#dc2626}
.toast{position:fixed;bottom:18px;right:18px;z-index:200;padding:11px 18px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.2)}
.tb{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
/* Work expand */
.wcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;overflow:hidden}
.wcard-hd{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;flex-wrap:wrap}
.wcard-hd:hover{background:#f8faff}
.pbar{height:5px;border-radius:100px;background:#f1f5f9;overflow:hidden;flex:1;min-width:60px}
.pbar-f{height:100%;border-radius:100px;transition:width .3s}
/* Meeting card */
.mcard{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:10px;padding:16px;display:flex;gap:14px}
.datebox{flex-shrink:0;width:50px;text-align:center;border-radius:10px;padding:8px 4px}
/* Cuota */
.crow{border-radius:9px;margin-bottom:5px;border:1px solid}
.crow-hd{padding:9px 13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
@media(max-width:700px){aside{display:none}.fg{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.page{padding:12px}}
</style>
</head>
<body>
<div id="R"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const API='https://script.google.com/macros/s/AKfycbxqO7Z4y2j3wukVw1zKMecRS16CmrEa2n0PVXK-vM36_4cYtK4CNdfHLDOwp_iaH8w62Q/exec'
const USERS=[
  {id:'u1',u:'admin', p:'research2024',role:'admin',name:'Administrador'},
  {id:'u2',u:'edison',p:'asesor2024',  role:'admin',name:'Edison Bonifaz'},
]
const TIPOS=['Asesoría de tesis/proyectos','Análisis estadístico','Artículo científico','Publicación en revistas','Revisión bibliográfica','Diseño de instrumentos','Otro']
const ESTADOS=['Nuevo','En progreso','Revisión','Completado','Cancelado']
const MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
const DIAS=['D','L','M','X','J','V','S']
const WA_TPLS=[
  {id:'reminder',msg:'Hola {{nombre}} 👋\n\nTe recuerdo que tienes un pago pendiente:\n\n💼 Trabajo: *"{{trabajo}}"*\n💳 Cuota: *{{cuota}}*\n💰 Monto: *${{monto}}*\n📅 Vence: *{{fecha}}*\n\nPor favor realiza la transferencia y envía el comprobante.\n\n🙏 Gracias\n— Research Assesor'},
  {id:'overdue', msg:'Hola {{nombre}}, espero que estés bien.\n\nEl pago del trabajo *"{{trabajo}}"* está vencido:\n\n💳 Cuota: *{{cuota}}*\n💰 Monto: *${{monto}}*\n📅 Venció el: *{{fecha}}*\n\nPor favor comunícate para coordinar el pago.\n\n— Research Assesor'},
  {id:'meeting', msg:'Hola {{nombre}} 👋\n\nTe confirmo nuestra reunión:\n\n📅 Fecha: *{{fecha}}*\n🕐 Hora: *{{hora}}*\n💻 Plataforma: *{{plat}}*\n🔗 Enlace: {{link}}\n\n¡Nos vemos pronto!\n— Research Assesor'},
]

// ── API — directo a Sheets ────────────────────────────────────────────────────
async function apiGet(action){
  try{const r=await fetch(API+'?action='+(action||'getData')+'&t='+Date.now());return await r.json()}
  catch(e){return{error:e.message}}
}
async function apiPost(body){
  try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});return await r.json()}
  catch(e){return{error:e.message}}
}

// ── ESTADO ────────────────────────────────────────────────────────────────────
let user=null,page='dashboard',modal=null
let data={clientes:[],trabajos:[],cuotas:[],abonos:[],reuniones:[]}
let loading=false,syncing=false,syncMsg='',syncErr=false
let search='',wExp=null,wSt='Todos',cSt='Todos',mvw='upcoming'
let calM=new Date().getMonth(),calY=new Date().getFullYear()

function draw(){document.getElementById('R').innerHTML=user?htmlApp():htmlLogin()}

// ── HELPERS ───────────────────────────────────────────────────────────────────
const v=id=>(document.getElementById(id)||{}).value||''
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
const jss=o=>esc(JSON.stringify(o))
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5)
const fmt=n=>{const x=parseFloat(n)||0;return x%1===0?String(Math.round(x)):x.toFixed(2)}

function bdg(t,c){const m={green:'bg',blue:'bb',amber:'ba',red:'br'};return'<span class="b '+(m[c]||'bx')+'">'+esc(t)+'</span>'}
function cStat(c){
  if(parseFloat(c.pagado||0)>=parseFloat(c.acordado||0)&&parseFloat(c.acordado||0)>0)return'pagado'
  if(parseFloat(c.pagado||0)>0)return'parcial'
  if(c.fechaVencimiento&&new Date(c.fechaVencimiento)<new Date())return'vencido'
  return'pendiente'
}
function cColor(s){return{pagado:'green',parcial:'blue',vencido:'red',pendiente:'amber'}[s]||'gray'}
function wBal(t){
  const cs=data.cuotas.filter(c=>c.trabajoId===t.id)
  const paid=cs.reduce((s,c)=>s+parseFloat(c.pagado||0),0)
  const total=parseFloat(t.total||0)
  return{total,paid,bal:total-paid,pct:total>0?Math.round(paid/total*100):0}
}
function waUrl(phone,msg){
  const c=String(phone||'').replace(/\D/g,'')
  const ec=c.startsWith('0')?'593'+c.slice(1):c.startsWith('593')?c:'593'+c
  return'https://wa.me/'+ec+'?text='+encodeURIComponent(msg)
}
function waTpl(id,vars){
  const t=WA_TPLS.find(x=>x.id===id)||WA_TPLS[0]
  return t.msg.replace(/{{(\w+)}}/g,(_,k)=>vars[k]!==undefined?String(vars[k]):'')
}
function toast(msg,err){
  const d=document.createElement('div')
  d.className='toast';d.style.background=err?'#dc2626':'#059669'
  d.textContent=(err?'✗ ':'✓ ')+msg
  document.body.appendChild(d);setTimeout(()=>d.remove(),3000)
}

// ── CARGA / MUTACIÓN ──────────────────────────────────────────────────────────
async function loadData(){
  loading=true;syncMsg='Cargando...';syncErr=false;draw()
  const r=await apiGet('getData')
  if(r&&!r.error){
    data={
      clientes:  r.clientes  ||[],
      trabajos:  r.trabajos  ||[],
      cuotas:    r.cuotas    ||[],
      abonos:    r.abonos    ||[],
      reuniones: r.reuniones ||[],
    }
    syncMsg='✓ '+new Date().toLocaleTimeString('es-EC');syncErr=false
  }else{syncMsg='Error: '+(r&&r.error||'Sin conexión');syncErr=true}
  loading=false;draw()
}

// PubTracker pattern: update UI → call API → reload
async function saveRec(tabla,rec,isNew){
  const key=tabla.toLowerCase()
  data[key]=isNew?[...data[key],rec]:data[key].map(x=>x.id===rec.id?rec:x)
  modal=null;draw()
  syncing=true;syncMsg='Guardando...';draw()
  const r=await apiPost({action:isNew?'insertar':'actualizar',tabla,fila:rec,id:rec.id})
  syncing=false
  if(r&&r.ok){toast('Guardado ✓');await loadData()}
  else{toast('Error: '+(r&&r.error||'Fallo'),'err');await loadData()}
}

async function delRec(tabla,id,msg){
  if(!confirm(msg||'¿Eliminar?'))return
  data[tabla.toLowerCase()]=data[tabla.toLowerCase()].filter(x=>x.id!==id);draw()
  const r=await apiPost({action:'eliminar',tabla,id})
  if(r&&r.ok){toast('Eliminado ✓');await loadData()}
  else{toast('Error: '+(r&&r.error||''),'err');await loadData()}
}

function doLogin(){
  const u=v('lu'),p=v('lp')
  const found=USERS.find(x=>x.u===u&&x.p===p)
  if(!found){const e=document.getElementById('lerr');e.textContent='Credenciales incorrectas';e.style.display='block';return}
  user=found;loadData()
}

function goTo(p){page=p;search='';wExp=null;draw()}
function htmlPage(){
  if(page==='dashboard')return htmlDash()
  if(page==='clientes') return htmlClientes()
  if(page==='trabajos') return htmlTrabajos()
  if(page==='cobros')   return htmlCobros()
  if(page==='reuniones')return htmlReuniones()
  return''
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function htmlDash(){
  const {clientes,trabajos,cuotas,abonos,reuniones}=data
  const cobrado  =abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0)
  const pendiente=cuotas.filter(c=>cStat(c)!=='pagado').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const activos  =trabajos.filter(t=>t.estado!=='Completado'&&t.estado!=='Cancelado').length
  const vencidas =cuotas.filter(c=>cStat(c)==='vencido').length
  const hoy=new Date().toISOString().split('T')[0]
  const proxR=reuniones.filter(r=>r.fecha>=hoy).sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,3)

  let h='<div class="kpis">'
    +'<div class="kpi"><div class="kpi-i" style="background:#dbeafe">👥</div><div><div class="kpi-n">'+clientes.length+'</div><div class="kpi-l">Clientes</div></div></div>'
    +'<div class="kpi"><div class="kpi-i" style="background:#dcfce7">💼</div><div><div class="kpi-n">'+activos+'</div><div class="kpi-l">Trabajos activos</div></div></div>'
    +'<div class="kpi"><div class="kpi-i" style="background:#dcfce7">💰</div><div><div class="kpi-n" style="color:#059669">$'+fmt(cobrado)+'</div><div class="kpi-l">Cobrado</div></div></div>'
    +'<div class="kpi"><div class="kpi-i" style="background:#fef3c7">⏰</div><div><div class="kpi-n" style="color:#b45309">$'+fmt(pendiente)+'</div><div class="kpi-l">Por cobrar</div></div></div>'
    +(vencidas?'<div class="kpi"><div class="kpi-i" style="background:#fee2e2">⚠️</div><div><div class="kpi-n" style="color:#dc2626">'+vencidas+'</div><div class="kpi-l">Vencidas</div></div></div>':'')
    +'</div>'

  if(vencidas) h+='<div style="background:#fee2e2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#dc2626;display:flex;align-items:center;justify-content:space-between">⚠️ <strong>'+vencidas+' cuota'+(vencidas>1?'s':'')+' vencida'+(vencidas>1?'s':'')+'</strong><button class="btn btn-r btn-sm" onclick="goTo(\'cobros\')">Ver →</button></div>'

  if(proxR.length){
    h+='<div class="card"><div class="card-hd"><h3>📅 Próximas reuniones</h3><button class="btn btn-g btn-sm" onclick="goTo(\'reuniones\')">Ver todas</button></div>'
    proxR.forEach(r=>{
      const cl=clientes.find(c=>c.id===r.clienteId)
      const dObj=new Date(r.fecha+'T12:00:00')
      h+='<div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #f8fafc">'
        +'<div style="width:44px;text-align:center;background:#f0f6ff;border:1px solid #dbeafe;border-radius:9px;padding:6px 3px;flex-shrink:0">'
        +'<div style="font-size:10px;font-weight:700;color:#1d4ed8">'+MESES[dObj.getMonth()].slice(0,3).toUpperCase()+'</div>'
        +'<div style="font-size:20px;font-weight:800;color:#1e293b;line-height:1">'+dObj.getDate()+'</div></div>'
        +'<div style="flex:1"><strong>'+esc(r.titulo)+'</strong><div style="font-size:12px;color:#64748b">'+esc(cl&&cl.nombre||'—')+' · '+esc(r.hora||'')+'</div></div>'
        +(r.link?'<a href="'+esc(r.link)+'" target="_blank" class="btn btn-g btn-sm" style="text-decoration:none">Unirse</a>':'')
        +'</div>'
    })
    h+='</div>'
  }

  h+='<div class="card"><div class="card-hd"><h3>Clientes recientes</h3><button class="btn btn-g btn-sm" onclick="goTo(\'clientes\')">Ver todos</button></div>'
    +'<table><thead><tr><th>Nombre</th><th>Institución</th><th>Ciudad</th><th>Teléfono</th></tr></thead><tbody>'
  const rec=[...clientes].reverse().slice(0,5)
  if(rec.length){rec.forEach(c=>{h+='<tr><td><strong>'+esc(c.nombre)+'</strong></td><td>'+esc(c.institucion||'—')+'</td><td>'+esc(c.ciudad||'—')+'</td><td>'+esc(c.telefono||'—')+'</td></tr>'})}
  else h+='<tr><td colspan="4" class="empty">Sin clientes aún</td></tr>'
  h+='</tbody></table></div>'
  return h
}

// ── CLIENTES ──────────────────────────────────────────────────────────────────
function htmlClientes(){
  const q=search.toLowerCase()
  const list=data.clientes.filter(c=>!q||(c.nombre+' '+c.institucion+' '+c.ciudad).toLowerCase().includes(q))
  let h='<div class="tb"><input placeholder="Buscar..." oninput="search=this.value;draw()" value="'+esc(search)+'"/>'
    +'<button class="btn btn-p" onclick="openModal(\'cliente\',null)">+ Nuevo cliente</button></div>'
  h+='<div class="card"><table><thead><tr><th>Nombre</th><th>Institución</th><th>Ciudad</th><th>Teléfono</th><th>Email</th><th>Trabajos</th><th></th></tr></thead><tbody>'
  if(list.length){list.forEach(c=>{
    const nT=data.trabajos.filter(t=>t.clienteId===c.id).length
    h+='<tr><td><strong>'+esc(c.nombre)+'</strong></td>'
      +'<td>'+esc(c.institucion||'—')+'</td><td>'+esc(c.ciudad||'—')+'</td>'
      +'<td>'+(c.telefono?'<a href="'+waUrl(c.telefono,'Hola '+c.nombre)+'" target="_blank" class="btn btn-wa btn-sm" style="text-decoration:none">💬 '+esc(c.telefono)+'</a>':'—')+'</td>'
      +'<td>'+esc(c.email||'—')+'</td>'
      +'<td>'+bdg(nT,'blue')+'</td>'
      +'<td><span style="display:flex;gap:4px"><button class="btn btn-g btn-sm" onclick=\'openModal("cliente",'+jss(c)+')\'>✏️</button>'
      +'<button class="btn btn-r btn-sm" onclick="delRec(\'Clientes\',\''+c.id+'\',\'¿Eliminar cliente?\')">🗑</button></span></td></tr>'
  })}else h+='<tr><td colspan="7" class="empty">Sin clientes registrados</td></tr>'
  h+='</tbody></table></div>'
  return h
}

// ── TRABAJOS — expandibles con cuotas ─────────────────────────────────────────
function htmlTrabajos(){
  const q=search.toLowerCase()
  const list=data.trabajos.filter(t=>{
    const cl=data.clientes.find(c=>c.id===t.clienteId)
    return(!q||(t.titulo+' '+(cl&&cl.nombre||'')+' '+t.tipo).toLowerCase().includes(q))
      &&(wSt==='Todos'||t.estado===wSt)
  })
  let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">'
    +'<div><strong style="font-size:16px">Trabajos</strong><span style="font-size:12px;color:#64748b;margin-left:8px">'+data.trabajos.length+' registrados · '+data.trabajos.filter(t=>t.estado==='En progreso').length+' activos</span></div>'
    +'<button class="btn btn-p" onclick="openModal(\'trabajo\',null)">+ Nuevo trabajo</button></div>'
  h+='<div class="tb"><input placeholder="Buscar..." oninput="search=this.value;draw()" value="'+esc(search)+'"/>'
    +['Todos',...ESTADOS].map(s=>'<button class="btn btn-sm '+(wSt===s?'btn-p':'btn-g')+'" onclick="wSt=\''+s+'\';draw()">'+s+'</button>').join('')
    +'</div>'

  if(!list.length)return h+'<div class="card"><p class="empty">Sin trabajos</p></div>'

  list.forEach(t=>{
    const cl=data.clientes.find(c=>c.id===t.clienteId)
    const bal=wBal(t)
    const cuotas=data.cuotas.filter(c=>c.trabajoId===t.id)
    const hasVenc=cuotas.some(c=>cStat(c)==='vencido')
    const isExp=wExp===t.id
    const SC={Completado:'green','En progreso':'blue',Revisión:'blue',Cancelado:'gray'}

    h+='<div class="wcard" style="border-color:'+(hasVenc?'#fecaca':'#e2e8f0')+'">'
      +'<div class="wcard-hd" onclick="wExp=wExp===\''+t.id+'\'?null:\''+t.id+'\';draw()">'
      +'<div style="flex:1;min-width:0">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">'
      +'<strong style="font-size:14px">'+esc(t.titulo)+'</strong>'
      +bdg(t.estado||'Nuevo',SC[t.estado]||'amber')
      +(hasVenc?'<span class="b br">⚠ vencido</span>':'')
      +'</div>'
      +'<div style="font-size:12px;color:#64748b">'+esc(cl&&cl.nombre||'—')+' · '+esc(t.tipo||'—')+'</div>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-shrink:0">'
      +'<div style="text-align:right;font-size:12px"><div style="font-weight:700">$'+fmt(bal.total)+'</div><div style="color:#059669">$'+fmt(bal.paid)+' cobrado</div></div>'
      +'<div><div class="pbar" style="width:72px"><div class="pbar-f" style="width:'+bal.pct+'%;background:'+(bal.pct===100?'#059669':'#1d4ed8')+'"></div></div><div style="font-size:10px;color:#94a3b8;text-align:center">'+bal.pct+'%</div></div>'
      +'<div style="display:flex;gap:4px">'
      +'<button class="btn btn-g btn-sm" onclick=\'event.stopPropagation();openModal("trabajo",'+jss(t)+')\'>✏️</button>'
      +'<button class="btn btn-r btn-sm" onclick="event.stopPropagation();delRec(\'Trabajos\',\''+t.id+'\',\'¿Eliminar trabajo?\')">🗑</button>'
      +'</div>'
      +'<span style="color:#94a3b8;font-size:16px">'+(isExp?'▲':'▼')+'</span>'
      +'</div></div>'

    if(isExp){
      h+='<div style="border-top:1px solid #f1f5f9;padding:14px 16px">'
      if(t.notas) h+='<p style="font-size:12px;color:#64748b;margin-bottom:10px">📝 '+esc(t.notas)+'</p>'
      if(t.progreso||t.fechaInicio) h+='<div style="font-size:12px;color:#475569;margin-bottom:10px">Progreso: <strong>'+esc(t.progreso||0)+'%</strong>'+(t.fechaInicio?' · Inicio: '+esc(t.fechaInicio):'')+(t.fechaFin?' · Entrega: '+esc(t.fechaFin):'')+'</div>'

      h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
        +'<strong style="font-size:12px;color:#475569">Plan de pagos ('+cuotas.length+')</strong>'
        +'<button class="btn btn-g btn-sm" onclick="openModal(\'cuota\',{trabajoId:\''+t.id+'\',nro:'+(cuotas.length+1)+'})">+ Cuota</button>'
        +'</div>'

      if(cuotas.length){
        cuotas.forEach(c=>{
          const st=cStat(c)
          const saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
          const bgc={pagado:'#dcfce7',parcial:'#dbeafe',vencido:'#fee2e2',pendiente:'#fef3c7'}[st]||'#f9fafb'
          const bdc={pagado:'#bbf7d0',parcial:'#bfdbfe',vencido:'#fecaca',pendiente:'#fde68a'}[st]||'#e2e8f0'
          const phone=cl&&cl.telefono
          h+='<div class="crow" style="background:'+bgc+';border-color:'+bdc+'">'
            +'<div class="crow-hd">'
            +'<div style="flex:1"><strong style="font-size:13px">'+esc(c.label||'Cuota')+'</strong>'
            +'<div style="font-size:11px;color:#64748b">Vence: '+esc(c.fechaVencimiento||'—')+'</div></div>'
            +'<div style="text-align:right;min-width:80px">'
            +'<div style="font-weight:700;font-size:14px">$'+fmt(c.acordado)+'</div>'
            +(parseFloat(c.pagado||0)>0?'<div style="font-size:10px;color:#059669">+$'+fmt(c.pagado)+' pagado</div>':'')
            +(saldo>0&&st!=='pagado'?'<div style="font-size:10px;color:#b45309">Saldo $'+fmt(saldo)+'</div>':'')
            +'</div>'
            +bdg(st,cColor(st))
            +(st!=='pagado'?'<button class="btn btn-green btn-sm" onclick="openModal(\'abono\',{cuotaId:\''+c.id+'\',trabajoId:\''+t.id+'\',label:\''+esc(c.label)+'\',acordado:\''+esc(c.acordado)+'\',pagado:\''+esc(c.pagado)+'\'})">💵 Pago</button>':'')
            +(phone?'<button class="btn btn-wa btn-sm" onclick="waRec(\''+c.id+'\',\''+t.id+'\',\''+esc(phone)+'\','+(st==='vencido'?'\'overdue\'':'\'reminder\'')+')">💬</button>':'')
            +'</div>'
          // historial abonos
          const abs=data.abonos.filter(a=>a.cuotaId===c.id)
          if(abs.length){
            h+='<div style="border-top:1px solid '+bdc+';padding:5px 13px;display:flex;gap:10px;flex-wrap:wrap">'
            abs.forEach(a=>{h+='<span style="font-size:11px;color:#059669">🧾 $'+fmt(a.monto)+' · '+esc(a.fecha)+(a.comprobante?' · '+esc(a.comprobante):'')+'</span>'})
            h+='</div>'
          }
          h+='</div>'
        })
      }else{
        h+='<p style="font-size:12px;color:#94a3b8;text-align:center;padding:10px">Sin cuotas — usa "+ Cuota" para agregar</p>'
      }
      h+='</div>'
    }
    h+='</div>'
  })
  return h
}

// ── COBROS ────────────────────────────────────────────────────────────────────
function htmlCobros(){
  const q=search.toLowerCase()
  const rows=data.cuotas.map(c=>{
    const t=data.trabajos.find(x=>x.id===c.trabajoId)
    const cl=data.clientes.find(x=>x.id===t.clienteId)
    const st=cStat(c)
    return{...c,_t:t,_cl:cl,_st:st}
  }).filter(c=>{
    return(cSt==='Todos'||cSt===c._st)
      &&(!q||((c._cl&&c._cl.nombre||'')+(c._t&&c._t.titulo||'')).toLowerCase().includes(q))
  }).sort((a,b)=>{
    const o={vencido:0,parcial:1,pendiente:2,pagado:3}
    return o[a._st]-o[b._st]||new Date(a.fechaVencimiento)-new Date(b.fechaVencimiento)
  })

  const cobrado=data.abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0)
  const pendiente=data.cuotas.filter(c=>cStat(c)!=='pagado').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const vencido=data.cuotas.filter(c=>cStat(c)==='vencido').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const total=data.cuotas.reduce((s,c)=>s+parseFloat(c.acordado||0),0)

  let h='<div class="kpis">'
    +'<div class="kpi"><div class="kpi-i" style="background:#f8faff">📋</div><div><div class="kpi-n">$'+fmt(total)+'</div><div class="kpi-l">Total facturado</div></div></div>'
    +'<div class="kpi"><div class="kpi-i" style="background:#dcfce7">✅</div><div><div class="kpi-n" style="color:#059669">$'+fmt(cobrado)+'</div><div class="kpi-l">Cobrado</div></div></div>'
    +'<div class="kpi"><div class="kpi-i" style="background:#fef3c7">⏰</div><div><div class="kpi-n" style="color:#b45309">$'+fmt(pendiente)+'</div><div class="kpi-l">Por cobrar</div></div></div>'
    +(vencido>0?'<div class="kpi"><div class="kpi-i" style="background:#fee2e2">⚠️</div><div><div class="kpi-n" style="color:#dc2626">$'+fmt(vencido)+'</div><div class="kpi-l">Vencido</div></div></div>':'')
    +'</div>'

  h+='<div class="tb"><input placeholder="Buscar..." oninput="search=this.value;draw()" value="'+esc(search)+'"/>'
    +['Todos','vencido','pendiente','parcial','pagado'].map(s=>'<button class="btn btn-sm '+(cSt===s?'btn-p':'btn-g')+'" onclick="cSt=\''+s+'\';draw()">'+s.charAt(0).toUpperCase()+s.slice(1)+'</button>').join('')
    +'<button class="btn btn-g btn-sm" style="margin-left:auto" onclick="exportCobros()">⬇ CSV</button>'
    +'</div>'

  if(!rows.length)return h+'<div class="card"><p class="empty">Sin resultados</p></div>'

  rows.forEach(c=>{
    const st=c._st,saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
    const today=new Date(),due=new Date(c.fechaVencimiento)
    const days=Math.ceil((due-today)/86400000)
    const bgc={pagado:'#dcfce7',parcial:'#dbeafe',vencido:'#fee2e2',pendiente:'#fef3c7'}[st]||'#f9fafb'
    const bdc={pagado:'#bbf7d0',parcial:'#bfdbfe',vencido:'#fecaca',pendiente:'#fde68a'}[st]||'#e2e8f0'
    const phone=c._cl&&c._cl.telefono

    h+='<div style="background:'+bgc+';border:1px solid '+bdc+';border-radius:10px;margin-bottom:8px;overflow:hidden">'
      +'<div style="display:flex;align-items:center;gap:10px;padding:11px 15px;flex-wrap:wrap">'
      +'<div style="flex:1;min-width:150px"><strong style="font-size:13px">'+esc(c._cl&&c._cl.nombre||'—')+'</strong>'
      +'<div style="font-size:11px;color:#64748b">'+esc(c._t&&c._t.titulo||'—')+' — '+esc(c.label||'—')+'</div></div>'
      +'<div style="text-align:center;min-width:80px"><div style="font-weight:700;font-size:14px">$'+fmt(c.acordado)+'</div>'
      +(parseFloat(c.pagado||0)>0?'<div style="font-size:10px;color:#059669">+$'+fmt(c.pagado)+'</div>':'')
      +(saldo>0&&st!=='pagado'?'<div style="font-size:11px;font-weight:600;color:#b45309">Saldo $'+fmt(saldo)+'</div>':'')
      +'</div>'
      +'<div style="text-align:center;min-width:85px"><div style="font-size:12px">'+esc(c.fechaVencimiento||'—')+'</div>'
      +(st!=='pagado'?'<div style="font-size:11px;color:'+(days<0?'#dc2626':days<=3?'#b45309':'#94a3b8')+'">'+(days<0?Math.abs(days)+'d vencido':days===0?'Hoy':'en '+days+'d')+'</div>':'')
      +'</div>'
      +bdg(st,cColor(st))
      +'<div style="display:flex;gap:5px">'
      +(st!=='pagado'?'<button class="btn btn-green btn-sm" onclick="openModal(\'abono\',{cuotaId:\''+c.id+'\',trabajoId:\''+c.trabajoId+'\',label:\''+esc(c.label)+'\',acordado:\''+esc(c.acordado)+'\',pagado:\''+esc(c.pagado)+'\'})">💵 Pago</button>':'')
      +(phone?'<button class="btn btn-wa btn-sm" onclick="waRec(\''+c.id+'\',\''+c.trabajoId+'\',\''+esc(phone)+'\','+(st==='vencido'?'\'overdue\'':'\'reminder\'')+')">💬 WA</button>':'')
      +'</div></div>'
    // Abonos
    const abs=data.abonos.filter(a=>a.cuotaId===c.id)
    if(abs.length){
      h+='<div style="border-top:1px solid '+bdc+';padding:5px 15px;display:flex;gap:10px;flex-wrap:wrap">'
      abs.forEach(a=>{h+='<span style="font-size:11px;color:#059669">🧾 $'+fmt(a.monto)+' · '+esc(a.fecha)+(a.comprobante?' · '+esc(a.comprobante):'')+'</span>'})
      h+='</div>'
    }
    h+='</div>'
  })
  return h
}

function waRec(cuotaId,trabajoId,phone,tplId){
  const c=data.cuotas.find(x=>x.id===cuotaId)
  const t=data.trabajos.find(x=>x.id===trabajoId)
  const cl=data.clientes.find(x=>x.id===t.clienteId)
  if(!c||!phone)return
  const msg=waTpl(tplId,{nombre:cl&&cl.nombre||'',trabajo:t&&t.titulo||'',cuota:c.label||'',monto:fmt(c.acordado),fecha:c.fechaVencimiento||''})
  window.open(waUrl(phone,msg),'_blank')
}

function exportCobros(){
  let csv='\uFEFFCliente,Trabajo,Cuota,Acordado,Pagado,Saldo,Vencimiento,Estado\n'
  data.cuotas.forEach(c=>{
    const t=data.trabajos.find(x=>x.id===c.trabajoId)
    const cl=data.clientes.find(x=>x.id===t.clienteId)
    const saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
    csv+='"'+[cl&&cl.nombre||'',t&&t.titulo||'',c.label||'',c.acordado||0,c.pagado||0,saldo.toFixed(2),c.fechaVencimiento||'',cStat(c)].join('","')+'"\n'
  })
  const a=document.createElement('a')
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv)
  a.download='cobros_'+new Date().toISOString().slice(0,10)+'.csv';a.click()
}

function htmlReuniones(){

      calDays[d.getDate()]=(calDays[d.getDate()]||[]).concat(r)
  })

  else{
    list.forEach(r=>{
      const cl=data.clientes.find(c=>c.id===r.clienteId)
      const dObj=new Date(r.fecha+'T12:00:00')
      const isToday=r.fecha===hoy
      const isPast=r.fecha<hoy
      h+='<div class="mcard" style="opacity:'+(isPast?.65:1)+';border-color:'+(isToday?'#bfdbfe':'#e2e8f0')+'">'
        +'<div class="datebox" style="'+(isToday?'background:#dbeafe;border:1px solid #bfdbfe':'background:#f8faff;border:1px solid #e2e8f0')+'">'
        +'<div style="font-size:10px;font-weight:700;color:'+(isToday?'#1d4ed8':'#94a3b8')+'">'+MESES[dObj.getMonth()].slice(0,3).toUpperCase()+'</div>'
        +'<div style="font-size:20px;font-weight:800;line-height:1;color:'+(isToday?'#1d4ed8':'#1e293b')+'">'+dObj.getDate()+'</div>'
        +'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">'
        +'<strong style="font-size:14px">'+esc(r.titulo)+'</strong>'
        +(isToday?'<span class="b bb">HOY</span>':'')
        +(!r.link&&!isPast?'<span class="b ba">Sin link</span>':'')
        +'</div>'
        +'<div style="font-size:12px;color:#64748b;margin-bottom:5px">'+esc(cl&&cl.nombre||'—')+'</div>'
        +'<div style="font-size:12px;color:#475569">🕐 '+esc(r.hora||'—')+' · 💻 '+esc(r.plataforma||'—')+'</div>'
        +(r.notas?'<div style="font-size:11px;color:#94a3b8;margin-top:3px">📝 '+esc(r.notas)+'</div>':'')
        +(r.link?'<div style="display:flex;align-items:center;gap:6px;margin-top:7px;padding:5px 9px;background:#f0f9ff;border-radius:7px;border:1px solid #bae6fd">'
          +'<span style="font-size:11px;color:#0369a1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.link)+'</span>'
          +'<button class="btn btn-g btn-sm" onclick="navigator.clipboard.writeText(\''+esc(r.link)+'\');this.textContent=\'✓\';setTimeout(()=>this.textContent=\'Copiar\',2000)">Copiar</button>'
          +'</div>':'')
        +'</div>'
        +'<div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">'
        +(r.link
          ?'<a href="'+esc(r.link)+'" target="_blank" class="btn btn-g btn-sm" style="text-decoration:none;justify-content:center">🎥 Unirse</a>'

    +Array(dim).fill(0).map((_,i)=>{
      const day=i+1,hm=!!calDays[day]
      const isN=day===today.getDate()&&calM===today.getMonth()&&calY===today.getFullYear()

  h+='<div class="card" style="padding:13px;margin-top:10px">'
    +'<div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:8px">PLATAFORMAS</div>'

      {n:'Whereby',u:'https://whereby.com',c:'#5c5bd4'}].map(p=>
      '<a href="'+p.u+'" target="_blank" style="display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;margin-bottom:4px;background:#f8faff;text-decoration:none;border:1px solid #e2e8f0">'
      +'<div style="width:7px;height:7px;border-radius:50%;background:'+p.c+'"></div>'
      +'<span style="font-size:12px;font-weight:600;color:#1e293b">'+p.n+'</span>'
      +'<span style="margin-left:auto;font-size:11px;color:#94a3b8">↗</span></a>'
    ).join('')
    +'</div>'
    +'</div>'

  h+='</div>'
  return h
}

function calUrl(r,clName){
  const tt=encodeURIComponent((r.titulo||'Reunión')+(clName?' — '+clName:''))
  const dt=(r.fecha||'').replace(/-/g,'')
  const [hh,mm]=(r.hora||'10:00').split(':')
  const eh=String(parseInt(hh)+1).padStart(2,'0')
  return'https://calendar.google.com/calendar/r/eventedit?text='+tt+'&dates='+dt+'T'+hh+mm+'00/'+dt+'T'+eh+mm+'00&location='+encodeURIComponent(r.link||'')+'&details='+encodeURIComponent('Research Assesor\n'+(r.link||''))
}

function waMeet(rid){
  const r=data.reuniones.find(x=>x.id===rid)
  const cl=data.clientes.find(x=>x.id===r.clienteId)
  if(!r||!(cl&&cl.telefono))return
  const msg=waTpl('meeting',{nombre:cl.nombre||'',fecha:r.fecha||'',hora:r.hora||'',plat:r.plataforma||'',link:r.link||''})
  window.open(waUrl(cl.telefono,msg),'_blank')
}

async function genMeet(titulo,fecha,hora){
  return new Promise((resolve,reject)=>{
    const cb='_mc_'+Date.now()
    const s=document.createElement('script')
    const to=setTimeout(()=>{cleanup();reject(new Error('Timeout'))},15000)
    function cleanup(){clearTimeout(to);delete window[cb];s.parentNode&&s.parentNode.removeChild(s)}
    window[cb]=d=>{cleanup();d.error?reject(new Error(d.error)):d.meetLink?resolve(d.meetLink):reject(new Error('Sin link'))}
    s.src=API+'?action=createMeet&title='+encodeURIComponent(titulo)+'&date='+encodeURIComponent(fecha)+'&time='+encodeURIComponent(hora||'10:00')+'&duration=60&callback='+cb
    s.onerror=()=>{cleanup();reject(new Error('Sin conexión'))}
    document.head.appendChild(s)
  })
}

async function clickGenMeet(){
  const btn=document.getElementById('btnMeet')
  const sta=document.getElementById('meetSta')
  const titulo=v('r0')||'Reunión Research Assesor'
  const fecha=v('r3'),hora=v('r4')
  btn.disabled=true;btn.textContent='⟳ Creando...'
  sta.innerHTML='<span style="color:#b45309">Creando Google Meet...</span>'
  try{
    const link=await genMeet(titulo,fecha,hora)
    document.getElementById('r6').value=link
    sta.innerHTML='<span style="color:#059669">✓ Meet creado: '+esc(link)+'</span>'
  }catch(e){
    const url=calUrl({titulo,fecha,hora,link:''},'')
    window.open(url,'_blank')
    sta.innerHTML='<span style="color:#b45309">⚠ No automático. Se abrió Google Calendar — copia el link meet.google.com/xxx-yyy aquí.</span>'
  }finally{btn.disabled=false;btn.textContent='🎥 Generar Meet'}
}

      +'</div>'

function previewPlan(){
  const total=parseFloat(document.getElementById('f4')&&document.getElementById('f4').value||0)
  const n=parseInt(document.getElementById('tp_n')&&document.getElementById('tp_n').value||1)
  const d=document.getElementById('tp_d')&&document.getElementById('tp_d').value
  const el=document.getElementById('pprev');if(!el)return
  if(!total||!n){el.innerHTML='<em>Ingresa el valor total para ver el plan</em>';return}
  const pc=Math.floor(total*100/n)/100
  const last=Math.round((total-pc*(n-1))*100)/100
  let h='Plan: '
  for(let i=0;i<Math.min(n,5);i++){
    const dt=new Date(d||new Date());dt.setMonth(dt.getMonth()+i)
    const lb=i===0?'Anticipo':`Cuota ${i+1}`+(i===n-1&&n>1?' (final)':'')
    const am=i===n-1?last:pc
    h+='<span style="background:#dbeafe;color:#1d4ed8;border-radius:4px;padding:2px 6px;margin:2px;font-size:11px;display:inline-block">'+lb+' $'+fmt(am)+' · '+dt.toISOString().split('T')[0]+'</span>'
  }
  if(n>5)h+='<em style="color:#94a3b8"> ...y '+(n-5)+' más</em>'
  el.innerHTML=h
}

async function submitTrabajo(id,isEdit){
  const titulo=v('f0'),clienteId=v('f1')
  if(!titulo){alert('Título obligatorio');return}
  if(!clienteId){alert('Selecciona un cliente');return}
  const cl=data.clientes.find(c=>c.id===clienteId)
  const total=parseFloat(v('f4'))||0
  const rec={id:id||uid(),clienteId,clienteNombre:cl&&cl.nombre||'',titulo,tipo:v('f2'),estado:v('f3'),total,progreso:v('f5'),fechaInicio:v('f6'),fechaFin:v('f7'),notas:v('f8'),createdAt:id?(modal.rec.createdAt||''):new Date().toISOString()}
  await saveRec('Trabajos',rec,!id)
  if(!isEdit&&total>0){
    const n=parseInt(v('tp_n'))||1,d=v('tp_d')||new Date().toISOString().split('T')[0]
    const pc=Math.floor(total*100/n)/100
    const last=Math.round((total-pc*(n-1))*100)/100
    for(let i=0;i<n;i++){
      const dt=new Date(d);dt.setMonth(dt.getMonth()+i)
      const lb=i===0?'Anticipo':`Cuota ${i+1}`+(i===n-1&&n>1?' (final)':'')
      const am=i===n-1?last:pc
      await apiPost({action:'insertar',tabla:'Cuotas',fila:{id:uid(),trabajoId:rec.id,label:lb,fechaVencimiento:dt.toISOString().split('T')[0],acordado:am,pagado:0,estado:'pendiente'}})
    }
    await loadData()
  }
}

async function submitAbono(cuotaId,trabajoId,acordado,pagadoPrev){
  const monto=parseFloat(v('a0'));if(!monto||monto<=0){alert('Monto inválido');return}
  const newPagado=parseFloat(pagadoPrev||0)+monto
  const newAcordado=parseFloat(acordado||0)
  const newSt=newPagado>=newAcordado?'pagado':newPagado>0?'parcial':'pendiente'
  const cuota=data.cuotas.find(c=>c.id===cuotaId)
  const cuotaUpd={...cuota,pagado:newPagado,estado:newSt}
  const abono={id:uid(),cuotaId,trabajoId,fecha:v('a1'),monto,nota:v('a3'),comprobante:v('a2')}
  modal=null;syncing=true;syncMsg='Guardando...';draw()
  await apiPost({action:'insertar',tabla:'Abonos',fila:abono})
  await apiPost({action:'actualizar',tabla:'Cuotas',id:cuotaId,fila:cuotaUpd})
  syncing=false;toast('Pago registrado ✓');await loadData()
}

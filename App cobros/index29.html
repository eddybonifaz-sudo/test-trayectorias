<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Research Assesor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#eef2f7;color:#1a2540;min-height:100vh}
:root{
  --brand:#1a56db;--brand-dk:#1447b2;--brand-lt:#e8f0fe;
  --green:#0e9f6e;--green-bg:#f0fdf4;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#e02424;--red-bg:#fef2f2;
  --violet:#7e3af2;--violet-bg:#f5f3ff;
  --surface:#fff;--bg:#eef2f7;--border:#e5eaf3;
  --text:#1a2540;--text2:#4b5563;--text3:#9ca3af;
  --r:12px;--rs:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04)
}

/* ── LOGIN ── */
.lw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f0fe 0%,#f0f4ff 40%,#eef2f7 100%);padding:20px}
.l-brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.l-brand-text{display:flex;align-items:baseline;gap:4px}
.l-brand-r{font-size:28px;font-weight:800;color:var(--brand);letter-spacing:-1px}
.l-brand-rest{font-size:28px;font-weight:400;color:#374151;letter-spacing:-0.5px}
.l-sub{font-size:13px;color:var(--text3);margin-top:4px;text-align:center}
.lb{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(26,86,219,.1),0 1px 4px rgba(0,0,0,.06)}
.lb-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.lb-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.lf-group{margin-bottom:16px}
.lf-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.3px}
.lf-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:all .15s}
.lf-input:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(26,86,219,.1)}
.l-btn{width:100%;padding:13px;border-radius:var(--rs);border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;background:var(--brand);color:#fff;margin-top:8px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.l-btn:hover{background:var(--brand-dk);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,86,219,.3)}
.l-err{background:var(--red-bg);border:1px solid #fecaca;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
aside{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.a-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.a-logo-text{display:flex;align-items:baseline;gap:3px}
.a-logo-r{font-size:17px;font-weight:800;color:var(--brand);letter-spacing:-.5px}
.a-logo-rest{font-size:17px;font-weight:400;color:#374151;letter-spacing:-.3px}
nav{padding:10px 8px;flex:1}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .12s;position:relative}
.ni:hover{background:#f3f6ff;color:var(--brand)}
.ni.on{background:var(--brand-lt);color:var(--brand);font-weight:700}
.ni .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.n-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;padding:12px 12px 4px;text-transform:uppercase}
.a-foot{padding:14px;border-top:1px solid var(--border)}
.a-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:#f8faff;margin-bottom:8px}
.a-avatar{width:32px;height:32px;border-radius:8px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.a-uname{font-size:12px;font-weight:700;color:var(--text)}
.a-urole{font-size:11px;color:var(--text3)}
main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar h2{font-size:16px;font-weight:800;flex:1;color:var(--text)}
.page{padding:24px;flex:1}

/* ── COMPONENTS ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.kpi-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;line-height:1;color:var(--text)}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:4px}
.kpi-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.15}
.kpi-bar{height:3px;border-radius:100px;margin-top:10px;background:#f1f5f9;overflow:hidden}
.kpi-bar-f{height:100%;border-radius:100px;transition:width .5s ease}

.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.card-hd{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f8fafc}
.card-hd h3{font-size:13px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #f1f5f9;background:#fafbff}
td{padding:11px 16px;border-bottom:1px solid #f8fafc;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--brand);color:#fff}.btn-p:hover{background:var(--brand-dk)}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:#f3f6ff;color:var(--brand)}
.btn-r{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.btn-wa{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}

/* ── BADGES ── */
.b{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:#dcfce7;color:#15803d}.bb{background:#dbeafe;color:#1d4ed8}
.ba{background:#fef3c7;color:#b45309}.br{background:#fee2e2;color:#dc2626}
.bx{background:#f1f5f9;color:#475569}.bv{background:var(--violet-bg);color:var(--violet)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:540px;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:800;color:var(--brand);margin-bottom:20px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg .full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
textarea{resize:vertical;min-height:64px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid #f1f5f9;padding-top:16px}

/* ── WORK EXPAND ── */
.wcard{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.wcard-hd{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap}
.wcard-hd:hover{background:#fafbff}
.pbar{height:5px;border-radius:100px;background:#f1f5f9;overflow:hidden;flex:1;min-width:60px}
.pbar-f{height:100%;border-radius:100px;transition:width .4s}
.mcard{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;padding:16px;display:flex;gap:14px;box-shadow:var(--shadow)}
.datebox{flex-shrink:0;width:52px;text-align:center;border-radius:10px;padding:8px 4px}
.crow{border-radius:9px;margin-bottom:5px;border:1px solid}
.crow-hd{padding:9px 13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── SYNC ── */
.sp{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600}
.sp-ok{background:#dcfce7;color:#15803d}.sp-ld{background:#fef3c7;color:#b45309}.sp-er{background:#fee2e2;color:#dc2626}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;z-index:200;padding:12px 20px;border-radius:12px;color:#fff;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tin .2s ease;display:flex;align-items:center;gap:8px}
@keyframes tin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* ── DASHBOARD CHARTS ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid.three{grid-template-columns:1fr 1fr 1fr}
.chart-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--text3);margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{border-radius:5px 5px 0 0;width:100%;min-height:4px;transition:all .5s ease}
.bar-label{font-size:9px;color:var(--text3);font-weight:600;white-space:nowrap}
.bar-val{font-size:10px;font-weight:700;color:var(--text2)}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-legend{flex:1}
.donut-item{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.progress-item{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--text2)}
.progress-bar{height:6px;background:#f1f5f9;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width .6s ease}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.stat-row:last-child{border-bottom:none}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f8fafc;font-size:12px}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}

/* ── TOOLBAR ── */
.tb{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}

/* ── ALERT ── */
.alert-venc{background:#fee2e2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red);display:flex;align-items:center;justify-content:space-between}

@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}
@media(max-width:700px){aside{display:none}.fg{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.page{padding:14px}.dash-grid,.dash-grid.three{grid-template-columns:1fr}}
</style>
</head>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API='https://script.google.com/macros/s/AKfycbxqO7Z4y2j3wukVw1zKMecRS16CmrEa2n0PVXK-vM36_4cYtK4CNdfHLDOwp_iaH8w62Q/exec'
const USERS=[
  {id:'u1',u:'admin', p:'research2024',role:'admin',name:'Administrador'},
  {id:'u2',u:'edison',p:'asesor2024',  role:'admin',name:'Edison Bonifaz'},
]
const TIPOS=['Asesoría de tesis/proyectos','Análisis estadístico','Artículo científico','Publicación en revistas','Revisión bibliográfica','Diseño de instrumentos','Otro']
const ESTADOS=['Nuevo','En progreso','Revisión','Completado','Cancelado']
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
const DIAS=['D','L','M','X','J','V','S']
const WA_TPLS=[
  {id:'reminder',msg:'Hola {{nombre}} 👋\n\nTe recuerdo que tienes un pago pendiente:\n\n💼 Trabajo: *"{{trabajo}}"*\n💳 Cuota: *{{cuota}}*\n💰 Monto: *${{monto}}*\n📅 Vence: *{{fecha}}*\n\nPor favor realiza la transferencia.\n\n🙏 Gracias\n— Research Assesor'},
  {id:'overdue', msg:'Hola {{nombre}}, espero que estés bien.\n\nEl pago del trabajo *"{{trabajo}}"* está vencido:\n\n💳 Cuota: *{{cuota}}*\n💰 Monto: *${{monto}}*\n📅 Venció el: *{{fecha}}*\n\n— Research Assesor'},
  {id:'meeting', msg:'Hola {{nombre}} 👋\n\nTe confirmo nuestra reunión:\n\n📅 Fecha: *{{fecha}}*\n🕐 Hora: *{{hora}}*\n💻 Plataforma: *{{plat}}*\n🔗 Enlace: {{link}}\n\n¡Nos vemos pronto!\n— Research Assesor'},
]

// ─── API ──────────────────────────────────────────────────────────────────────
async function apiGet(action){
  try{const r=await fetch(API+'?action='+(action||'getData')+'&t='+Date.now());return await r.json()}
  catch(e){return{error:e.message}}
}
async function apiPost(body){
  try{const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});return await r.json()}
  catch(e){return{error:e.message}}
}

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let user=null,page='dashboard',modal=null
let data={clientes:[],trabajos:[],cuotas:[],abonos:[],reuniones:[]}
let loading=false,syncing=false,syncMsg='',syncErr=false
let search='',wExp=null,wSt='Todos',cSt='Todos',mvw='upcoming'
let calM=new Date().getMonth(),calY=new Date().getFullYear()

function draw(){document.getElementById('R').innerHTML=user?htmlApp():htmlLogin()}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const v=id=>(document.getElementById(id)||{}).value||''
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
const jss=o=>esc(JSON.stringify(o))
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5)
const fmt=n=>{const x=parseFloat(n)||0;return x%1===0?String(Math.round(x)):x.toFixed(2)}

function bdg(t,c){const m={green:'bg',blue:'bb',amber:'ba',red:'br',violet:'bv'};return'<span class="b '+(m[c]||'bx')+'">'+esc(t)+'</span>'}
function cStat(c){
  if(parseFloat(c.pagado||0)>=parseFloat(c.acordado||0)&&parseFloat(c.acordado||0)>0)return'pagado'
  if(parseFloat(c.pagado||0)>0)return'parcial'
  if(c.fechaVencimiento&&new Date(c.fechaVencimiento)<new Date())return'vencido'
  return'pendiente'
}
function cColor(s){return{pagado:'green',parcial:'blue',vencido:'red',pendiente:'amber'}[s]||'gray'}
function wBal(t){
  const cs=data.cuotas.filter(c=>c.trabajoId===t.id)
  const paid=cs.reduce((s,c)=>s+parseFloat(c.pagado||0),0)
  const total=parseFloat(t.total||0)
  return{total,paid,bal:total-paid,pct:total>0?Math.round(paid/total*100):0}
}
function waUrl(phone,msg){

function waTpl(id,vars){

// ─── CARGA ────────────────────────────────────────────────────────────────────
async function loadData(){
  loading=true;syncMsg='Cargando...';syncErr=false;draw()
  const r=await apiGet('getData')
  if(r&&!r.error){
    data={
      clientes:  r.clientes  ||[],
      trabajos:  r.trabajos  ||[],
      cuotas:    r.cuotas    ||[],
      abonos:    r.abonos    ||[],
      reuniones: r.reuniones ||[],
    }
    syncMsg='✓ '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})
    syncErr=false
  }else{
    syncMsg='Error conexión'+(r&&r.error?' — '+r.error:'');syncErr=true
    // Demo solo si hay error de red total
    if(window._demoData&&(!r||r.error==='Failed to fetch'||r.error==='NetworkError')){
      data=window._demoData
      syncMsg='⚡ Modo demo — sin conexión al Sheets'
    }
  }
  loading=false;draw()
}

async function saveRec(tabla,rec,isNew){
  const key=tabla.toLowerCase()
  data[key]=isNew?[...data[key],rec]:data[key].map(x=>x.id===rec.id?rec:x)
  modal=null;draw()
  syncing=true;syncMsg='Guardando...';draw()
  const r=await apiPost({action:isNew?'insertar':'actualizar',tabla,fila:rec,id:rec.id})
  syncing=false
  if(r&&r.ok){toast('Guardado ✓');await loadData()}
  else{toast('Error: '+(r&&r.error||''),'err');await loadData()}
}
async function delRec(tabla,id,msg){
  if(!confirm(msg||'¿Eliminar?'))return
  data[tabla.toLowerCase()]=data[tabla.toLowerCase()].filter(x=>x.id!==id);draw()
  const r=await apiPost({action:'eliminar',tabla,id})
  if(r&&r.ok){toast('Eliminado ✓');await loadData()}
  else{toast('Error: '+(r&&r.error||''),'err');await loadData()}
}

function htmlDash(){
  const {clientes,trabajos,cuotas,abonos,reuniones}=data
  const now=new Date()
  const hoy=now.toISOString().split('T')[0]
  const mesActual=now.getMonth(), anioActual=now.getFullYear()

  // ── KPI calcs ──
  const cobrado    =abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0)
  const totalFact  =cuotas.reduce((s,c)=>s+parseFloat(c.acordado||0),0)
  const pendiente  =cuotas.filter(c=>cStat(c)!=='pagado').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const vencidas   =cuotas.filter(c=>cStat(c)==='vencido')
  const activos    =trabajos.filter(t=>t.estado!=='Completado'&&t.estado!=='Cancelado').length
  const completados=trabajos.filter(t=>t.estado==='Completado').length
  const cobPct     =totalFact>0?Math.round(cobrado/totalFact*100):0
  const proxR      =reuniones.filter(r=>r.fecha>=hoy).sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,3)

  // ── 12 meses de datos (6 pasados + mes actual + 5 futuros) ──
  const allMonths = Array.from({length:12},(_,i)=>{
    const d=new Date(now); d.setDate(1); d.setMonth(d.getMonth()-6+i)
    const m=d.getMonth(), y=d.getFullYear()
    const isPast=y<anioActual||(y===anioActual&&m<mesActual)
    const isCurrent=y===anioActual&&m===mesActual
    const isFuture=y>anioActual||(y===anioActual&&m>mesActual)

    // Cobrado real en ese mes
    const real=abonos.reduce((s,a)=>{
      const ad=new Date(a.fecha||'')
      return(ad.getMonth()===m&&ad.getFullYear()===y)?s+parseFloat(a.monto||0):s
    },0)

    // Proyectado: cuotas pendientes/parciales con vencimiento en ese mes
    const proj=cuotas.filter(c=>{
      const st=cStat(c)
      if(st==='pagado')return false
      const dv=new Date(c.fechaVencimiento||'')
      return dv.getMonth()===m&&dv.getFullYear()===y
    }).reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)

    return{label:MESES[m],m,y,real:Math.round(real),proj:Math.round(proj),isPast,isCurrent,isFuture}
  })

  // Meses pasados (incluye actual)
  const pastMonths   = allMonths.filter(x=>x.isPast||x.isCurrent)
  const futureMonths = allMonths.filter(x=>x.isFuture)

  // Ingresos reales del mes actual

  // Ingresos mes anterior

  // Proyección total futura
  const proyeccionTotal=futureMonths.reduce((s,x)=>s+x.proj,0)
  // Mejor mes futuro

  // Variación mes a mes

    +'<div class="donut-legend">'
    +Object.entries(cuotaDist).map(([k,v])=>{
      const pct=cuotas.length>0?Math.round(v/cuotas.length*100):0

    }).join('')

  // Estado trabajos
  h+='<div class="chart-wrap"><div class="chart-title">Estado de trabajos</div><div class="chart-sub">Distribución por estado</div>'
    +Object.entries(estadoDist).filter(([,v])=>v>0).map(([k,v])=>{
      const pct=Math.round(v/totalTrab*100)

        +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+estadoColors[k]+'"></div></div></div>'
    }).join('')
    +'</div>'
  h+='</div>'

  // ── Bottom row ──
  h+='<div class="dash-grid">'

  // Top servicios
  h+='<div class="card"><div class="card-hd"><h3>Servicios más solicitados</h3></div><div style="padding:14px 18px">'
    +topTipos.map(([tipo,cnt])=>{
      const pct=Math.round(cnt/totalTrab*100)
      const short=tipo.length>28?tipo.slice(0,28)+'…':tipo
      return'<div class="progress-item"><div class="progress-label"><span title="'+esc(tipo)+'">'+esc(short)+'</span><span style="font-weight:700">'+cnt+'</span></div>'
        +'<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:var(--brand)"></div></div></div>'
    }).join('')+(topTipos.length===0?'<p style="color:var(--text3);font-size:13px;text-align:center;padding:16px">Sin datos aún</p>':'')
    +'</div></div>'

  // Reuniones
  h+='<div class="card"><div class="card-hd"><h3>Próximas reuniones</h3><button class="btn btn-g btn-sm" onclick="goTo(\'reuniones\')">Ver todas →</button></div><div style="padding:4px 0">'
    +(proxR.length?proxR.map(r=>{
      const cl=clientes.find(c=>c.id===r.clienteId)
      const dObj=new Date(r.fecha+'T12:00:00'),isToday=r.fecha===hoy
      return'<div class="activity-item" style="padding:9px 18px">'
        +'<div class="act-dot" style="background:'+(isToday?'var(--green)':'var(--brand)')+'"></div>'
        +'<div style="flex:1"><div style="font-weight:600;font-size:13px">'+esc(r.titulo)+'</div>'
        +'<div style="color:var(--text3);font-size:12px">'+esc(cl&&cl.nombre||'—')+' · '+(isToday?'<strong style="color:var(--green)">Hoy</strong>':MESES_FULL[dObj.getMonth()]+' '+dObj.getDate())+' '+esc(r.hora||'')+'</div></div>'
        +(r.link?'<a href="'+esc(r.link)+'" target="_blank" class="btn btn-g btn-sm" style="text-decoration:none">🎥</a>':'')
        +'</div>'
    }).join('')
    :'<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:80px;color:var(--text3);font-size:13px"><span style="font-size:24px;margin-bottom:6px">📅</span>Sin reuniones próximas</div>')
    +'</div></div>'

  h+='</div>'

  // ── Últimos clientes y trabajos activos ──
  h+='<div class="dash-grid">'
  h+='<div class="card"><div class="card-hd"><h3>Clientes recientes</h3><button class="btn btn-g btn-sm" onclick="goTo(\'clientes\')">Ver todos →</button></div>'
    +'<table><thead><tr><th>Nombre</th><th>Institución</th><th>Trabajos</th></tr></thead><tbody>'
  const recCli=[...clientes].reverse().slice(0,4)
  if(recCli.length){recCli.forEach(c=>{const nT=trabajos.filter(t=>t.clienteId===c.id).length;h+='<tr><td><strong>'+esc(c.nombre)+'</strong></td><td style="color:var(--text3)">'+esc(c.institucion||'—')+'</td><td>'+bdg(nT,'blue')+'</td></tr>'})}
  else h+='<tr><td colspan="3" class="empty">Sin clientes aún</td></tr>'
  h+='</tbody></table></div>'

  h+='<div class="card"><div class="card-hd"><h3>Trabajos activos</h3><button class="btn btn-g btn-sm" onclick="goTo(\'trabajos\')">Ver todos →</button></div>'
    +'<table><thead><tr><th>Trabajo</th><th>Estado</th><th>Cobro</th></tr></thead><tbody>'
  const actTrab=trabajos.filter(t=>t.estado!=='Completado'&&t.estado!=='Cancelado').slice(0,4)
  if(actTrab.length){actTrab.forEach(t=>{const bal=wBal(t);h+='<tr><td><strong style="font-size:12px">'+esc(t.titulo.slice(0,30))+(t.titulo.length>30?'…':'')+'</strong></td>'+'<td>'+bdg(t.estado||'Nuevo',{Completado:'green','En progreso':'blue',Revisión:'amber',Cancelado:'gray'}[t.estado]||'amber')+'</td>'+'<td><div style="display:flex;align-items:center;gap:6px"><div class="pbar" style="width:60px"><div class="pbar-f" style="width:'+bal.pct+'%;background:'+(bal.pct===100?'var(--green)':'var(--brand)')+'"></div></div><span style="font-size:11px;color:var(--text3)">'+bal.pct+'%</span></div></td></tr>'})}
  else h+='<tr><td colspan="3" class="empty">Sin trabajos activos</td></tr>'
  h+='</tbody></table></div>'
  h+='</div>'

  return h
}

// ─── COBROS ───────────────────────────────────────────────────────────────────
function htmlCobros(){
  const q=search.toLowerCase()
  const rows=data.cuotas.map(c=>{
    const t=data.trabajos.find(x=>x.id===c.trabajoId)
    const cl=t?data.clientes.find(x=>x.id===t.clienteId):null
    const st=cStat(c)
    return{...c,_t:t,_cl:cl,_st:st}
  }).filter(c=>(cSt==='Todos'||cSt===c._st)&&(!q||((c._cl&&c._cl.nombre||'')+(c._t&&c._t.titulo||'')).toLowerCase().includes(q)))
    .sort((a,b)=>{const o={vencido:0,parcial:1,pendiente:2,pagado:3};return o[a._st]-o[b._st]||new Date(a.fechaVencimiento)-new Date(b.fechaVencimiento)})

  const cobrado=data.abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0)
  const pendiente=data.cuotas.filter(c=>cStat(c)!=='pagado').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const vencido=data.cuotas.filter(c=>cStat(c)==='vencido').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const total=data.cuotas.reduce((s,c)=>s+parseFloat(c.acordado||0),0)

  let h='<div class="kpis">'
    +'<div class="kpi"><div class="kpi-label">Total facturado</div><div class="kpi-value">$'+fmt(total)+'</div><div class="kpi-icon">📋</div></div>'
    +'<div class="kpi"><div class="kpi-label">Cobrado</div><div class="kpi-value" style="color:var(--green)">$'+fmt(cobrado)+'</div><div class="kpi-icon">✅</div></div>'
    +'<div class="kpi"><div class="kpi-label">Por cobrar</div><div class="kpi-value" style="color:var(--amber)">$'+fmt(pendiente)+'</div><div class="kpi-icon">⏰</div></div>'
    +(vencido>0?'<div class="kpi"><div class="kpi-label">Vencido</div><div class="kpi-value" style="color:var(--red)">$'+fmt(vencido)+'</div><div class="kpi-icon">⚠️</div></div>':'')
    +'</div>'
  h+='<div class="tb"><input placeholder="Buscar..." oninput="search=this.value;draw()" value="'+esc(search)+'" style="max-width:240px"/>'
    +['Todos','vencido','pendiente','parcial','pagado'].map(s=>'<button class="btn btn-sm '+(cSt===s?'btn-p':'btn-g')+'" onclick="cSt=\''+s+'\';draw()">'+s.charAt(0).toUpperCase()+s.slice(1)+'</button>').join('')
    +'<button class="btn btn-g btn-sm" style="margin-left:auto" onclick="exportCobros()">⬇ CSV</button></div>'
  if(!rows.length)return h+'<div class="card"><p class="empty">Sin resultados</p></div>'
  rows.forEach(c=>{
    const st=c._st,saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
    const today=new Date(),due=new Date(c.fechaVencimiento)
    const days=Math.ceil((due-today)/86400000)
    const bgc={pagado:'#dcfce7',parcial:'#dbeafe',vencido:'#fee2e2',pendiente:'#fef3c7'}[st]||'#f9fafb'
    const bdc={pagado:'#bbf7d0',parcial:'#bfdbfe',vencido:'#fecaca',pendiente:'#fde68a'}[st]||'#e2e8f0'
    const phone=c._cl&&c._cl.telefono
    h+='<div style="background:'+bgc+';border:1px solid '+bdc+';border-radius:10px;margin-bottom:8px;overflow:hidden">'
      +'<div style="display:flex;align-items:center;gap:10px;padding:11px 15px;flex-wrap:wrap">'
      +'<div style="flex:1;min-width:150px"><strong style="font-size:13px">'+esc(c._cl&&c._cl.nombre||'—')+'</strong>'
      +'<div style="font-size:11px;color:var(--text3)">'+esc(c._t&&c._t.titulo||'—')+' — '+esc(c.label||'—')+'</div></div>'
      +'<div style="text-align:center;min-width:80px"><div style="font-weight:700;font-size:14px">$'+fmt(c.acordado)+'</div>'
      +(parseFloat(c.pagado||0)>0?'<div style="font-size:10px;color:var(--green)">+$'+fmt(c.pagado)+'</div>':'')
      +(saldo>0&&st!=='pagado'?'<div style="font-size:11px;font-weight:600;color:var(--amber)">Saldo $'+fmt(saldo)+'</div>':'')
      +'</div>'
      +'<div style="text-align:center;min-width:85px"><div style="font-size:12px">'+esc(c.fechaVencimiento||'—')+'</div>'
      +(st!=='pagado'?'<div style="font-size:11px;color:'+(days<0?'var(--red)':days<=3?'var(--amber)':'var(--text3)')+'">'+(days<0?Math.abs(days)+'d vencido':days===0?'Hoy':'en '+days+'d')+'</div>':'')
      +'</div>'+bdg(st,cColor(st))
      +'<div style="display:flex;gap:5px">'
      +(st!=='pagado'?'<button class="btn btn-green btn-sm" onclick="openModal(\'abono\',{cuotaId:\''+c.id+'\',trabajoId:\''+c.trabajoId+'\',label:\''+esc(c.label)+'\',acordado:\''+esc(c.acordado)+'\',pagado:\''+esc(c.pagado)+'\'})">💵 Pago</button>':'')
      +(phone?'<button class="btn btn-wa btn-sm" onclick="waRec(\''+c.id+'\',\''+c.trabajoId+'\',\''+esc(phone)+'\','+(st==='vencido'?'\'overdue\'':'\'reminder\'')+')">💬</button>':'')
      +'</div></div>'
    const abs=data.abonos.filter(a=>a.cuotaId===c.id)
    if(abs.length){h+='<div style="border-top:1px solid '+bdc+';padding:5px 15px;display:flex;gap:10px;flex-wrap:wrap">'+abs.map(a=>'<span style="font-size:11px;color:var(--green)">🧾 $'+fmt(a.monto)+' · '+esc(a.fecha)+(a.comprobante?' · '+esc(a.comprobante):'')+' </span>').join('')+'</div>'}
    h+='</div>'
  })
  return h
}

function waRec(cuotaId,trabajoId,phone,tplId){
  const c=data.cuotas.find(x=>x.id===cuotaId)
  const t=data.trabajos.find(x=>x.id===trabajoId)
  const cl=t?data.clientes.find(x=>x.id===t.clienteId):null
  if(!c||!phone)return
  const msg=waTpl(tplId,{nombre:cl&&cl.nombre||'',trabajo:t&&t.titulo||'',cuota:c.label||'',monto:fmt(c.acordado),fecha:c.fechaVencimiento||''})
  window.open(waUrl(phone,msg),'_blank')
}
function exportCobros(){
  let csv='\uFEFFCliente,Trabajo,Cuota,Acordado,Pagado,Saldo,Vencimiento,Estado\n'
  data.cuotas.forEach(c=>{
    const t=data.trabajos.find(x=>x.id===c.trabajoId)
    const cl=t?data.clientes.find(x=>x.id===t.clienteId):null
    const saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
    csv+='"'+[cl&&cl.nombre||'',t&&t.titulo||'',c.label||'',c.acordado||0,c.pagado||0,saldo.toFixed(2),c.fechaVencimiento||'',cStat(c)].join('","')+'"\n'
  })
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv)
  a.download='cobros_'+new Date().toISOString().slice(0,10)+'.csv';a.click()
}

// ─── REUNIONES ────────────────────────────────────────────────────────────────
function htmlReuniones(){

function calUrl(r,clName){
  const tt=encodeURIComponent((r.titulo||'Reunión')+(clName?' — '+clName:''))
  const dt=(r.fecha||'').replace(/-/g,'')
  const [hh,mm]=(r.hora||'10:00').split(':')
  const eh=String(parseInt(hh)+1).padStart(2,'0')
  return'https://calendar.google.com/calendar/r/eventedit?text='+tt+'&dates='+dt+'T'+hh+mm+'00/'+dt+'T'+eh+mm+'00&location='+encodeURIComponent(r.link||'')+'&details='+encodeURIComponent('Research Assesor\n'+(r.link||''))
}
function waMeet(rid){
  const r=data.reuniones.find(x=>x.id===rid)
  const cl=r?data.clientes.find(x=>x.id===r.clienteId):null
  if(!r||!(cl&&cl.telefono))return
  const msg=waTpl('meeting',{nombre:cl.nombre||'',fecha:r.fecha||'',hora:r.hora||'',plat:r.plataforma||'',link:r.link||''})
  window.open(waUrl(cl.telefono,msg),'_blank')
}
async function genMeet(titulo,fecha,hora){
  return new Promise((resolve,reject)=>{
    const cb='_mc_'+Date.now();const s=document.createElement('script')
    const to=setTimeout(()=>{cleanup();reject(new Error('Timeout'))},15000)
    function cleanup(){clearTimeout(to);delete window[cb];s.parentNode&&s.parentNode.removeChild(s)}
    window[cb]=d=>{cleanup();d.error?reject(new Error(d.error)):d.meetLink?resolve(d.meetLink):reject(new Error('Sin link'))}
    s.src=API+'?action=createMeet&title='+encodeURIComponent(titulo)+'&date='+encodeURIComponent(fecha)+'&time='+encodeURIComponent(hora||'10:00')+'&duration=60&callback='+cb
    s.onerror=()=>{cleanup();reject(new Error('Sin conexión'))};document.head.appendChild(s)
  })
}
async function clickGenMeet(){
  const btn=document.getElementById('btnMeet'),sta=document.getElementById('meetSta')
  btn.disabled=true;btn.textContent='⟳ Creando...'
  sta.innerHTML='<span style="color:var(--amber)">Creando Google Meet...</span>'
  try{const link=await genMeet(v('r0')||'Reunión',v('r3'),v('r4'));document.getElementById('r6').value=link;sta.innerHTML='<span style="color:var(--green)">✓ Meet creado: '+esc(link)+'</span>'}
  catch(e){window.open(calUrl({titulo:v('r0'),fecha:v('r3'),hora:v('r4'),link:''},''),'_blank');sta.innerHTML='<span style="color:var(--amber)">⚠ Abrí Google Calendar — copia el link meet.google.com/xxx-yyy aquí.</span>'}
  finally{btn.disabled=false;btn.textContent='🎥 Generar Meet'}
}

function previewPlan(){
  const total=parseFloat((document.getElementById('f4')||{}).value||0)
  const n=parseInt((document.getElementById('tp_n')||{}).value||1)
  const d=(document.getElementById('tp_d')||{}).value
  const el=document.getElementById('pprev');if(!el)return
  if(!total||!n){el.innerHTML='<em>Ingresa el valor total para ver el plan</em>';return}
  const pc=Math.floor(total*100/n)/100,last=Math.round((total-pc*(n-1))*100)/100
  let h='Plan: '
  for(let i=0;i<Math.min(n,5);i++){
    const dt=new Date(d||new Date());dt.setMonth(dt.getMonth()+i)
    const lb=i===0?'Anticipo':'Cuota '+(i+1)+(i===n-1&&n>1?' (final)':'')

  }
  if(n>5)h+='<em style="color:var(--text3)"> ...y '+(n-5)+' más</em>'
  el.innerHTML=h
}

  await saveRec('Trabajos',rec,!id)
  if(!isEdit&&total>0){
    const n=parseInt(v('tp_n'))||1,d=v('tp_d')||new Date().toISOString().split('T')[0]

      const dt=new Date(d);dt.setMonth(dt.getMonth()+i)

}

  const newSt=newPagado>=parseFloat(acordado||0)?'pagado':newPagado>0?'parcial':'pendiente'
  const cuota=data.cuotas.find(c=>c.id===cuotaId)
  modal=null;syncing=true;syncMsg='Guardando...';draw()
  await apiPost({action:'insertar',tabla:'Abonos',fila:{id:uid(),cuotaId,trabajoId,fecha:v('a1'),monto,nota:v('a3'),comprobante:v('a2')}})
  await apiPost({action:'actualizar',tabla:'Cuotas',id:cuotaId,fila:{...cuota,pagado:newPagado,estado:newSt}})
  syncing=false;toast('Pago registrado ✓');await loadData()
}

function mReunion(d){
  const e=!!d.id,hoy=new Date();hoy.setDate(hoy.getDate()+1)
  const def=hoy.toISOString().split('T')[0]
  return'<h3>'+(e?'Editar':'Nueva')+' reunión</h3><div class="fg">'
    +'<div class="full"><label>Título *</label><input id="r0" value="'+esc(d.titulo||'')+'" placeholder="Ej: Revisión Cap. 2"/></div>'
    +'<div class="full"><label>Cliente</label><select id="r1"><option value="">Seleccionar...</option>'
    +data.clientes.map(c=>'<option value="'+esc(c.id)+'"'+(d.clienteId===c.id?' selected':'')+'>'+esc(c.nombre)+'</option>').join('')+'</select></div>'
    +'<div class="full"><label>Trabajo relacionado</label><select id="r2"><option value="">Ninguno</option>'
    +data.trabajos.map(t=>'<option value="'+esc(t.id)+'"'+(d.trabajoId===t.id?' selected':'')+'>'+esc(t.titulo.slice(0,42))+'</option>').join('')+'</select></div>'
    +'<div><label>Fecha *</label><input id="r3" type="date" value="'+esc(d.fecha||def)+'"/></div>'
    +'<div><label>Hora</label><input id="r4" type="time" value="'+esc(d.hora||'10:00')+'"/></div>'
    +'<div><label>Plataforma</label><select id="r5">'+['Google Meet','Zoom','Microsoft Teams','Whereby','Otra'].map(p=>'<option'+(d.plataforma===p?' selected':'')+'>'+p+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div style="margin-top:10px"><label>Enlace de reunión</label>'
    +'<div style="display:flex;gap:8px;align-items:center"><input id="r6" value="'+esc(d.link||'')+'" placeholder="Pega el link o usa → Generar Meet"/>'
    +'<button type="button" id="btnMeet" class="btn btn-p" style="flex-shrink:0" onclick="clickGenMeet()">🎥 Generar Meet</button></div>'
    +'<div id="meetSta" style="margin-top:5px;font-size:12px"></div>'
    +'<div style="margin-top:6px;padding:9px 12px;background:#f0f6ff;border-radius:8px;font-size:12px;color:var(--brand);line-height:1.6">'
    +'<strong>A:</strong> "Generar Meet" → crea automáticamente · <strong>B:</strong> Google Calendar → copia link meet.google.com/xxx</div></div>'
    +'<div style="margin-top:10px"><label>Notas</label><textarea id="r7" rows="2">'+esc(d.notas||'')+'</textarea></div>'
    +'<div class="ma"><button class="btn btn-g" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-p" onclick="submitReunion(\''+esc(d.id||'')+'\')">Guardar reunión</button></div>'
}
function submitReunion(id){
  const titulo=v('r0');if(!titulo){alert('Título obligatorio');return}
  const rec={id:id||uid(),titulo,clienteId:v('r1'),trabajoId:v('r2'),fecha:v('r3'),hora:v('r4'),plataforma:v('r5'),link:v('r6'),notas:v('r7')}
  saveRec('Reuniones',rec,!id)
}

function mUsuario(d){
  const e=!!d.id
  return'<h3>'+(e?'Editar':'Nuevo')+' usuario</h3><div class="fg">'
    +'<div class="full"><label>Nombre completo</label><input id="u0" value="'+esc(d.name||d.nombre||'')+'"/></div>'
    +'<div><label>Usuario (login)</label><input id="u1" value="'+esc(d.u||d.username||'')+'"/></div>'
    +'<div><label>Contraseña</label><input id="u2" value="'+esc(d.p||d.password||'')+'"/></div>'
    +'<div class="full"><label>Rol</label><select id="u3"><option value="admin"'+(d.role==='admin'?' selected':'')+'>Administrador</option><option value="lector"'+(d.role==='lector'?' selected':'')+'>Lector</option></select></div>'
    +'</div><div class="ma"><button class="btn btn-g" onclick="closeModal()">Cancelar</button>'
    +'<button class="btn btn-p" onclick="submitUsuario(\''+esc(d.id||'')+'\')">'+(e?'Actualizar':'Crear')+'</button></div>'
}
function submitUsuario(id){
  const nombre=v('u0'),usr=v('u1'),pass=v('u2'),rol=v('u3')
  if(!nombre||!usr||!pass){alert('Completa todos los campos');return}
  const users=(window._appUsers||USERS).slice()
  if(id){const idx=users.findIndex(u=>u.id===id);if(idx>-1)users[idx]=Object.assign({},users[idx],{name:nombre,u:usr,username:usr,p:pass,password:pass,role:rol})}
  else users.push({id:uid(),name:nombre,u:usr,username:usr,p:pass,password:pass,role:rol})
  window._appUsers=users;modal=null;draw();toast(id?'Actualizado ✓':'Creado ✓')
}

// ─── INICIO ───────────────────────────────────────────────────────────────────
draw()
</script>

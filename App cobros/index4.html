const SS_ID = 'TU_SPREADSHEET_ID_AQUI';

// ── doPost: sincronización automática (llamada por la plataforma al guardar) ──
function doPost(e) {
  try {
    const payload = JSON.parse(e.postData.contents);
    const ss      = SpreadsheetApp.openById(SS_ID);
    if (payload.action === 'syncAll') {
      if (payload.clients && payload.clients.length) syncSheet(ss, 'Clientes', payload.clients);

      return ok({ synced: true });
    }
    return ok({ error: 'Acción no reconocida' });
  } catch(err) {
    return ok({ error: err.toString() });
  }
}

// ── doGet: crea links de Google Meet (llamada via JSONP) ──────────────────────
function doGet(e) {
  try {
    const p = (e && e.parameter) || {};

    if (p.action === 'createMeet') {
      const title = p.title || 'Reunión Research Assesor';
      const date  = p.date  || new Date().toISOString().split('T')[0];
      const time  = p.time  || '10:00';
      const dur   = parseInt(p.duration) || 60;
      const [y,mo,d]  = date.split('-').map(Number);
      const [h,m]     = (time + ':00').split(':').map(Number);
      const start     = new Date(y, mo-1, d, h, m, 0);
      const end       = new Date(start.getTime() + dur * 60000);

      const resource = {
        summary: title,
        start: { dateTime: start.toISOString(), timeZone: Session.getScriptTimeZone() },
        end:   { dateTime: end.toISOString(),   timeZone: Session.getScriptTimeZone() },
        conferenceData: {
          createRequest: {
            requestId: 'ra-' + Date.now(),
            conferenceSolutionKey: { type: 'hangoutsMeet' }

        }
      };
      const event = Calendar.Events.insert(resource, 'primary', { conferenceDataVersion: 1 });
      const ep    = event.conferenceData &&

                    event.conferenceData.entryPoints.find(x => x.entryPointType === 'video');
      return jsonp(e, { meetLink: ep ? ep.uri : null });
    }

    // Sin acción: devuelve resumen de datos sincronizados
    const ss   = SpreadsheetApp.openById(SS_ID);

    return jsonp(e, { error: err.toString() });
  }
}

// ── syncSheet: crea o actualiza una pestaña con los datos ────────────────────
function syncSheet(ss, name, rows) {
  if (!rows || !rows.length) return;
  let sheet = ss.getSheetByName(name);
  if (!sheet) sheet = ss.insertSheet(name);
  sheet.clearContents();
  const headers = Object.keys(rows[0]);
  const headerRange = sheet.getRange(1, 1, 1, headers.length);
  headerRange.setValues([headers]);
  headerRange.setFontWeight('bold')
             .setBackground('#1E6FC8')
             .setFontColor('#FFFFFF');
  const data = rows.map(r => headers.map(h => String(r[h] ?? '')));
  sheet.getRange(2, 1, data.length, headers.length).setValues(data);
  sheet.setFrozenRows(1);
  try { sheet.autoResizeColumns(1, headers.length); } catch(e) {}
}

      .createTextOutput(cb + '(' + json + ')')
      .setMimeType(ContentService.MimeType.JAVASCRIPT);
  }
  return ok(data);
}

    .setMimeType(ContentService.MimeType.JSON);

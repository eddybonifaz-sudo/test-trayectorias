<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Research Assesor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#eef2f7;color:#1a2540;min-height:100vh}
:root{
  --brand:#1a56db;--brand-dk:#1447b2;--brand-lt:#e8f0fe;
  --green:#0e9f6e;--green-bg:#f0fdf4;
  --amber:#d97706;--amber-bg:#fffbeb;
  --red:#e02424;--red-bg:#fef2f2;
  --violet:#7e3af2;--violet-bg:#f5f3ff;
  --surface:#fff;--bg:#eef2f7;--border:#e5eaf3;
  --text:#1a2540;--text2:#4b5563;--text3:#9ca3af;
  --r:12px;--rs:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.04)
}

/* ── LOGIN ── */
.lw{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,#e8f0fe 0%,#f0f4ff 40%,#eef2f7 100%);padding:20px}
.l-brand{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.l-brand-text{display:flex;align-items:baseline;gap:4px}
.l-brand-r{font-size:28px;font-weight:800;color:var(--brand);letter-spacing:-1px}
.l-brand-rest{font-size:28px;font-weight:400;color:#374151;letter-spacing:-0.5px}
.l-sub{font-size:13px;color:var(--text3);margin-top:4px;text-align:center}
.lb{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(26,86,219,.1),0 1px 4px rgba(0,0,0,.06)}
.lb-title{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px}
.lb-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.lf-group{margin-bottom:16px}
.lf-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.3px}
.lf-input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:all .15s}
.lf-input:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(26,86,219,.1)}
.l-btn{width:100%;padding:13px;border-radius:var(--rs);border:none;cursor:pointer;font-size:15px;font-weight:700;font-family:inherit;background:var(--brand);color:#fff;margin-top:8px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.l-btn:hover{background:var(--brand-dk);transform:translateY(-1px);box-shadow:0 4px 16px rgba(26,86,219,.3)}
.l-err{background:var(--red-bg);border:1px solid #fecaca;border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:none}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
aside{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.a-logo{padding:20px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.a-logo-text{display:flex;align-items:baseline;gap:3px}
.a-logo-r{font-size:17px;font-weight:800;color:var(--brand);letter-spacing:-.5px}
.a-logo-rest{font-size:17px;font-weight:400;color:#374151;letter-spacing:-.3px}
nav{padding:10px 8px;flex:1}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .12s;position:relative}
.ni:hover{background:#f3f6ff;color:var(--brand)}
.ni.on{background:var(--brand-lt);color:var(--brand);font-weight:700}
.ni .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:20px}
.n-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.8px;padding:12px 12px 4px;text-transform:uppercase}
.a-foot{padding:14px;border-top:1px solid var(--border)}
.a-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:10px;background:#f8faff;margin-bottom:8px}
.a-avatar{width:32px;height:32px;border-radius:8px;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.a-uname{font-size:12px;font-weight:700;color:var(--text)}
.a-urole{font-size:11px;color:var(--text3)}
main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg)}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.topbar h2{font-size:16px;font-weight:800;flex:1;color:var(--text)}
.page{padding:24px;flex:1}

/* ── COMPONENTS ── */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(26,37,64,.13);border-color:var(--brand)}
.kpi-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.kpi-value{font-size:28px;font-weight:800;line-height:1;color:var(--text)}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:4px}
.kpi-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.15}
.kpi-bar{height:3px;border-radius:100px;margin-top:10px;background:#f1f5f9;overflow:hidden}
.kpi-bar-f{height:100%;border-radius:100px;transition:width .5s ease}

.card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.card-hd{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f8fafc}
.card-hd h3{font-size:13px;font-weight:700;color:var(--text)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #f1f5f9;background:#fafbff}
td{padding:11px 16px;border-bottom:1px solid #f8fafc;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.empty{text-align:center;padding:36px;color:var(--text3);font-size:13px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:var(--brand);color:#fff}.btn-p:hover{background:var(--brand-dk)}
.btn-green{background:var(--green);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-g{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-g:hover{background:#f3f6ff;color:var(--brand)}
.btn-r{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.btn-wa{background:#dcfce7;color:#16a34a;border:1px solid #bbf7d0}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}

/* ── BADGES ── */
.b{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg{background:#dcfce7;color:#15803d}.bb{background:#dbeafe;color:#1d4ed8}
.ba{background:#fef3c7;color:#b45309}.br{background:#fee2e2;color:#dc2626}
.bx{background:#f1f5f9;color:#475569}.bv{background:var(--violet-bg);color:var(--violet)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:#fff;border-radius:18px;padding:28px;width:100%;max-width:540px;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:800;color:var(--brand);margin-bottom:20px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg .full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--text);background:#fff;outline:none;transition:border .12s}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(26,86,219,.1)}
textarea{resize:vertical;min-height:64px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid #f1f5f9;padding-top:16px}

/* ── WORK EXPAND ── */
.wcard{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.wcard-hd{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;flex-wrap:wrap}
.wcard-hd:hover{background:#fafbff}
.pbar{height:5px;border-radius:100px;background:#f1f5f9;overflow:hidden;flex:1;min-width:60px}
.pbar-f{height:100%;border-radius:100px;transition:width .4s}
.mcard{background:#fff;border:1px solid var(--border);border-radius:14px;margin-bottom:10px;padding:16px;display:flex;gap:14px;box-shadow:var(--shadow)}
.datebox{flex-shrink:0;width:52px;text-align:center;border-radius:10px;padding:8px 4px}
.crow{border-radius:9px;margin-bottom:5px;border:1px solid}
.crow-hd{padding:9px 13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── SYNC ── */
.sp{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:20px;font-size:11px;font-weight:600}
.sp-ok{background:#dcfce7;color:#15803d}.sp-ld{background:#fef3c7;color:#b45309}.sp-er{background:#fee2e2;color:#dc2626}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;right:20px;z-index:200;padding:12px 20px;border-radius:12px;color:#fff;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:tin .2s ease;display:flex;align-items:center;gap:8px}
@keyframes tin{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:none}}

/* ── DASHBOARD CHARTS ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.dash-grid.three{grid-template-columns:1fr 1fr 1fr}
.chart-wrap{background:#fff;border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow)}
.chart-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.chart-sub{font-size:11px;color:var(--text3);margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:100px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{border-radius:5px 5px 0 0;width:100%;min-height:4px;transition:all .5s ease}
.bar-label{font-size:9px;color:var(--text3);font-weight:600;white-space:nowrap}
.bar-val{font-size:10px;font-weight:700;color:var(--text2)}
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-legend{flex:1}
.donut-item{display:flex;align-items:center;gap:7px;margin-bottom:7px;font-size:12px}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.progress-item{margin-bottom:10px}
.progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;color:var(--text2)}
.progress-bar{height:6px;background:#f1f5f9;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;transition:width .6s ease}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.stat-row:last-child{border-bottom:none}
.activity-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f8fafc;font-size:12px}
.activity-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}

/* ── TOOLBAR ── */
.tb{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}

/* ── ALERT ── */
.alert-venc{background:#fee2e2;border:1px solid #fecaca;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:var(--red);display:flex;align-items:center;justify-content:space-between}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.spin{display:inline-block;animation:spin .8s linear infinite}
@media(max-width:700px){aside{display:none}.fg{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.page{padding:14px}.dash-grid,.dash-grid.three{grid-template-columns:1fr}}
</style>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API='https://script.google.com/macros/s/AKfycbzqeby9GceuHt8ep8X2QqVUV_U4PUztJUvMRsLipduxQoxY0lqU0sz7Is8nZ3WB929Pjg/exec'
const USERS=[
  {id:'u1',u:'admin', p:'research2024',role:'admin',name:'Administrador'},
  {id:'u2',u:'edison',p:'asesor2024',  role:'admin',name:'Edison Bonifaz'},
]
const TIPOS=['Asesoría de tesis/proyectos','Análisis estadístico','Artículo científico','Publicación en revistas','Revisión bibliográfica','Diseño de instrumentos','Otro']
const ESTADOS=['Nuevo','En progreso','Revisión','Completado','Cancelado']
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']
const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']
const DIAS_FULL=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado']

// Convierte cualquier string de fecha a YYYY-MM-DD para input type="date"
function toISO(s){
  if(!s||s==='')return''
  s=String(s).trim()
  // Already ISO: 2026-03-15
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10)
  // Google Sheets US format: M/D/YYYY or MM/DD/YYYY
  const m1=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
  if(m1)return m1[3]+'-'+m1[1].padStart(2,'0')+'-'+m1[2].padStart(2,'0')
  // DD-MM-YYYY
  const m2=s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/)
  if(m2)return m2[3]+'-'+m2[2].padStart(2,'0')+'-'+m2[1].padStart(2,'0')
  // Sheets Date object string: "Sun Apr 07 2026 00:00:00 GMT..."
  const m3=s.match(/(\d{4}) (\d{2}:\d{2}:\d{2})/)
  if(m3){try{const d=new Date(s);if(!isNaN(d.getTime())){const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');return y+'-'+mo+'-'+dy}}catch(e){}}
  // ISO with time: 2026-04-07T10:30:00
  const m4=s.match(/^(\d{4}-\d{2}-\d{2})T/)
  if(m4)return m4[1]
  // Native parse fallback
  try{const d=new Date(s);if(!isNaN(d.getTime())){const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');return y+'-'+mo+'-'+dy}}catch(e){}
  return''
}

// Formatea fecha larga: "Lunes, 30 de marzo 2026"
function fmtD(s){
  if(!s||s==='---'||s==='')return'—'
  const iso=toISO(s)
  if(!iso||iso==='')return s||'—'
  try{
    // Parse as local date (avoid UTC shift)
    const p=iso.split('-')
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]))
    if(isNaN(d.getTime()))return s
    return DIAS_FULL[d.getDay()]+', '+d.getDate()+' de '+MESES_FULL[d.getMonth()].toLowerCase()+' '+d.getFullYear()
  }catch(e){return s}
}

// Formato corto: "15 mar 2026"
function fmtDCorto(s){
  if(!s||s==='')return'—'
  const iso=toISO(s)
  if(!iso)return s
  try{
    const p=iso.split('-')
    const d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]))
    if(isNaN(d.getTime()))return s
    return d.getDate()+' '+MESES_FULL[d.getMonth()].slice(0,3).toLowerCase()+' '+d.getFullYear()
  }catch(e){return s}
}
const DIAS=['D','L','M','X','J','V','S']
const INSTITUCIONES=[

// Cargar desde localStorage o usar defaults
function cargarTpls(){
  try{
    const saved=localStorage.getItem('wa_tpls_v5')
    if(!saved) return WA_TPLS_DEFAULT.map(function(t){return Object.assign({},t)})
    const parsed=JSON.parse(saved)
    // Check emoji integrity: broken char or missing emoji in default templates
    const hasBroken=parsed.some(function(t){
      return t.msg&&(t.msg.indexOf('\uFFFD')>-1||t.msg.indexOf('\u0000')>-1)
    })
    if(hasBroken){
      localStorage.removeItem('wa_tpls_v5')
      return WA_TPLS_DEFAULT.map(function(t){return Object.assign({},t)})
    }
    // Merge: keep user's custom templates, but refresh default templates
    // that have broken emojis (no emoji chars when they should have them)
    var merged=parsed.map(function(t){
      var def=WA_TPLS_DEFAULT.find(function(d){return d.id===t.id})
      if(def){
        // If saved template lacks emojis that default has, use default
        var defHasEmoji=/[\u{1F300}-\u{1FFFF}]/u.test(def.msg)
        var savedHasEmoji=/[\u{1F300}-\u{1FFFF}]/u.test(t.msg)
        if(defHasEmoji&&!savedHasEmoji) return Object.assign({},def)
      }
      return t
    })
    // Add any default templates not in saved
    WA_TPLS_DEFAULT.forEach(function(d){
      if(!merged.some(function(t){return t.id===d.id})) merged.push(Object.assign({},d))
    })
    return merged
  }catch(e){return WA_TPLS_DEFAULT.map(function(t){return Object.assign({},t)})}
}
function guardarTpls(tpls){
  try{localStorage.setItem('wa_tpls_v5',JSON.stringify(tpls))}catch(e){}
}
var WA_TPLS=cargarTpls()

async function apiGet(action){
  try{
    const r=await fetch(API+'?action='+(action||'getData')+'&t='+Date.now())
    return await r.json()
  }catch(e){return{error:e.message}}
}

async function apiPost(body){
  try{
    const r=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify(body)
    })
    const text=await r.text()
    try{return JSON.parse(text)}
    catch(pe){return{error:'Respuesta no JSON: '+text.slice(0,100)}}
  }catch(e){
    // Log full error details to console
    console.error('[apiPost] fetch error:',e.name,e.message,body)
    return{error:e.message+'  ('+e.name+')'}
  }
}

async function loadData(){
  loading=true;syncMsg='Cargando...';syncErr=false;draw()
  const r=await apiGet('getData')
  if(r&&!r.error){
    data={
      clientes:  r.clientes  ||[],
      trabajos:  r.trabajos  ||[],
      cuotas:    r.cuotas    ||[],
      abonos:    r.abonos    ||[],
      reuniones: r.reuniones ||[],
    }
    // Cache client portal users for login checks
    if(r.usuariosCliente) window._clientUsers=r.usuariosCliente||[]
    syncMsg='✓ '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})
    syncErr=false
  }else{
    syncMsg='Error conexión'+(r&&r.error?' — '+r.error:'');syncErr=true
    // Demo solo si hay error de red total
    if(window._demoData&&(!r||r.error==='Failed to fetch'||r.error==='NetworkError')){
      data=window._demoData
      syncMsg='⚡ Modo demo — sin conexión al Sheets'
    }
  }
  loading=false;draw()
}

async function saveRec(tabla,rec,isNew){
  // Optimistic update: update UI immediately, then sync in background
  const key=tabla.toLowerCase()
  if(data[key]){
    data[key]=isNew?[...data[key],rec]:data[key].map(x=>x.id===rec.id?rec:x)
  }
  modal=null;syncMsg='Guardando...';syncErr=false;draw()
  try{
    const r=await apiPost({action:isNew?'insertar':'actualizar',tabla,fila:rec,id:rec.id})
    if(r&&r.ok){
      syncMsg='✓ '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})
      toast('Guardado ✓')
      // Silent background reload - don't block UI
      apiGet('getData').then(function(rd){
        if(rd&&!rd.error){
          data={clientes:rd.clientes||[],trabajos:rd.trabajos||[],cuotas:rd.cuotas||[],abonos:rd.abonos||[],reuniones:rd.reuniones||[]}
          syncMsg='✓ '+new Date().toLocaleTimeString('es-EC',{hour:'2-digit',minute:'2-digit'})
          draw()
        }
      })
    }else{
      const msg=r&&r.error?r.error:'Sin respuesta'
      syncMsg='Error: '+msg;syncErr=true
      toast('Error: '+msg,'err')
      draw()
    }
  }catch(err){
    syncMsg='Error: '+err.message;syncErr=true
    toast('Error: '+err.message,'err');draw()
  }
}
async function delRec(tabla,id,msg){
  if(!confirm(msg||'¿Eliminar este registro?'))return
  // Optimistic: remove from UI immediately
  const key=tabla.toLowerCase()
  if(data[key]) data[key]=data[key].filter(function(x){return x.id!==id})
  syncMsg='Eliminando...';syncErr=false;draw()
  try{
    const r=await apiPost({action:'eliminar',tabla,id})
    if(r&&r.ok){
      toast('Eliminado ✓');syncMsg='✓ Eliminado'
      apiGet('getData').then(function(rd){
        if(rd&&!rd.error){
          data={clientes:rd.clientes||[],trabajos:rd.trabajos||[],cuotas:rd.cuotas||[],abonos:rd.abonos||[],reuniones:rd.reuniones||[]}
          draw()
        }
      })
    }else{
      const msg2=r&&r.error?r.error:'Sin respuesta'
      syncMsg='Error: '+msg2;syncErr=true
      toast('Error: '+msg2,'err')
      await loadData()  // reload to restore removed item
    }
  }catch(err){
    syncMsg='Error: '+err.message;syncErr=true
    toast('Error: '+err.message,'err')
    await loadData()
  }
}

function htmlDash(){
  const {clientes,trabajos,cuotas,abonos,reuniones}=data
  const now=new Date()
  const hoy=now.toISOString().split('T')[0]
  const mesActual=now.getMonth(), anioActual=now.getFullYear()

  // ── KPI calcs ──
  const cobrado    =abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0)
  const totalFact  =cuotas.reduce((s,c)=>s+parseFloat(c.acordado||0),0)
  const pendiente  =cuotas.filter(c=>cStat(c)!=='pagado').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const vencidas   =cuotas.filter(c=>cStat(c)==='vencido')
  const activos    =trabajos.filter(t=>t.estado!=='Completado'&&t.estado!=='Cancelado').length
  const completados=trabajos.filter(t=>t.estado==='Completado').length
  const cobPct     =totalFact>0?Math.round(cobrado/totalFact*100):0
  const proxR      =reuniones.filter(r=>r.fecha>=hoy).sort((a,b)=>a.fecha.localeCompare(b.fecha)).slice(0,3)

  // ── 12 meses de datos (6 pasados + mes actual + 5 futuros) ──
  const allMonths = Array.from({length:14},(_,i)=>{
    const d=new Date(now); d.setDate(1); d.setMonth(d.getMonth()-8+i)
    const m=d.getMonth(), y=d.getFullYear()
    const isPast=y<anioActual||(y===anioActual&&m<mesActual)
    const isCurrent=y===anioActual&&m===mesActual
    const isFuture=y>anioActual||(y===anioActual&&m>mesActual)

    // Cobrado real en ese mes
    const real=abonos.reduce((s,a)=>{
      const _af=toISO(a.fecha||'');const ad=_af?new Date(_af+'T12:00:00'):new Date(NaN)
      return(ad.getMonth()===m&&ad.getFullYear()===y)?s+parseFloat(a.monto||0):s
    },0)

    // Proyectado: cuotas pendientes/parciales con vencimiento en ese mes
    const proj=cuotas.filter(c=>{
      const st=cStat(c)
      if(st==='pagado')return false
      const _cv=toISO(c.fechaVencimiento||'');const dv=_cv?new Date(_cv+'T12:00:00'):new Date(NaN)
      return dv.getMonth()===m&&dv.getFullYear()===y
    }).reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)

    return{label:MESES[m],m,y,real:Math.round(real),proj:Math.round(proj),isPast,isCurrent,isFuture}
  })

  // Meses pasados (incluye actual)
  const pastMonths   = allMonths.filter(x=>x.isPast||x.isCurrent)
  const futureMonths = allMonths.filter(x=>x.isFuture)

  // Ingresos reales del mes actual — calculado directamente para mayor confiabilidad
  const ingresoMesActual=abonos.reduce((s,a)=>{
    const _af=toISO(a.fecha||'');if(!_af)return s
    const ad=new Date(_af+'T12:00:00')
    return(ad.getMonth()===mesActual&&ad.getFullYear()===anioActual)?s+parseFloat(a.monto||0):s
  },0)
  // Ingresos mes anterior
  const _prevM=mesActual===0?11:mesActual-1, _prevY=mesActual===0?anioActual-1:anioActual
  const ingresoMesAnterior=abonos.reduce((s,a)=>{
    const _af=toISO(a.fecha||'');if(!_af)return s
    const ad=new Date(_af+'T12:00:00')
    return(ad.getMonth()===_prevM&&ad.getFullYear()===_prevY)?s+parseFloat(a.monto||0):s
  },0)
  // Proyección total futura
  const proyeccionTotal=futureMonths.reduce((s,x)=>s+x.proj,0)
  // Mejor mes futuro
  const mejorMesFuturo=futureMonths.reduce((best,x)=>x.proj>best.proj?x:best,{proj:0,label:'—'})
  // Variación mes a mes
  const variacion=ingresoMesAnterior>0?Math.round((ingresoMesActual-ingresoMesAnterior)/ingresoMesAnterior*100):0

  // Use separate max for real vs projected so past bars stay visible
  const maxReal=Math.max(...allMonths.map(x=>x.real),1)
  const maxProj=Math.max(...allMonths.map(x=>x.proj),1)
  // Common scale: use the larger of the two so bars are comparable
  const maxVal=Math.max(maxReal,maxProj,1)
  // But ensure past months always show at least a visible proportion
  // by using the higher of maxReal or 50% of maxVal for past month scaling
  const realScale=Math.max(maxReal, Math.round(maxVal*0.4),1)

  // ── Estado cuotas ──

  const cuotaColors={pagado:'var(--green)',parcial:'var(--brand)',pendiente:'var(--amber)',vencido:'var(--red)'}

  const totalCuotas=Math.max(cuotas.length,1)

  // ── Estado trabajos ──
  const estadoDist={Nuevo:0,'En progreso':0,Revisión:0,Completado:0,Cancelado:0}
  trabajos.forEach(t=>{estadoDist[t.estado||'Nuevo']=(estadoDist[t.estado||'Nuevo']||0)+1})
  const estadoColors={Nuevo:'#93c5fd','En progreso':'var(--brand)',Revisión:'var(--amber)',Completado:'var(--green)',Cancelado:'#d1d5db'}
  const totalTrab=Math.max(trabajos.length,1)

  // ── Top tipos ──
  const tipoDist={}
  trabajos.forEach(t=>{const k=t.tipo||'Otro';tipoDist[k]=(tipoDist[k]||0)+1})
  const topTipos=Object.entries(tipoDist).sort((a,b)=>b[1]-a[1]).slice(0,5)
  let h=''

  h+='<div class="kpis">'
    +'<div class="kpi" style="cursor:pointer" onclick="goTo(\'clientes\')"><div class="kpi-label">Clientes</div><div class="kpi-value">'+clientes.length+'</div><div class="kpi-sub">'+activos+' con trabajos activos</div><div class="kpi-icon">👥</div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="goTo(\'trabajos\')"><div class="kpi-label">Trabajos activos</div><div class="kpi-value" style="color:var(--brand)">'+activos+'</div><div class="kpi-sub">'+completados+' completados</div><div class="kpi-icon">💼</div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="goTo(\'cobros\')"><div class="kpi-label">Total cobrado</div><div class="kpi-value" style="color:var(--green)">$'+fmt(cobrado)+'</div><div class="kpi-sub">de $'+fmt(totalFact)+' facturado</div><div class="kpi-icon">💰</div><div class="kpi-bar"><div class="kpi-bar-f" style="width:'+cobPct+'%;background:var(--green)"></div></div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="cSt=\'Todos\';goTo(\'cobros\')"><div class="kpi-label">Mes '+MESES[mesActual]+'</div><div class="kpi-value" style="color:var(--brand)">$'+fmt(ingresoMesActual)+'</div><div class="kpi-sub"><span style="color:'+(variacion>=0?'var(--green)':'var(--red)')+'">'+(variacion>=0?'▲':'▼')+' '+Math.abs(variacion)+'%</span> vs mes anterior</div><div class="kpi-icon">📈</div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="cSt=\'pendiente\';goTo(\'cobros\')"><div class="kpi-label">Proyección futura</div><div class="kpi-value" style="color:var(--violet)">$'+fmt(proyeccionTotal)+'</div><div class="kpi-sub">próximos 5 meses</div><div class="kpi-icon">🔮</div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="cSt=\'vencido\';goTo(\'cobros\')"><div class="kpi-label">Por cobrar</div><div class="kpi-value" style="color:var(--amber)">$'+fmt(pendiente)+'</div><div class="kpi-sub">'+(vencidas.length>0?'<span style="color:var(--red)">⚠ '+vencidas.length+' vencidas — clic para ver</span>':'✅ al día')+'</div><div class="kpi-icon">⏰</div></div>'
    +'</div>'
  // ── KPIs row ──
  h+='<div class="kpis">'
    +'<div class="kpi"><div class="kpi-label">Clientes</div><div class="kpi-value">'+clientes.length+'</div><div class="kpi-sub">registrados</div><div class="kpi-icon">👥</div></div>'
    +'<div class="kpi"><div class="kpi-label">Trabajos activos</div><div class="kpi-value" style="color:var(--brand)">'+activos+'</div><div class="kpi-sub">'+completados+' completados</div><div class="kpi-icon">💼</div></div>'
    +'<div class="kpi"><div class="kpi-label">Total cobrado</div><div class="kpi-value" style="color:var(--green)">$'+fmt(cobrado)+'</div><div class="kpi-sub">de $'+fmt(totalFact)+' facturado</div><div class="kpi-icon">💰</div><div class="kpi-bar"><div class="kpi-bar-f" style="width:'+cobPct+'%;background:var(--green)"></div></div></div>'

    +'<div class="kpi"><div class="kpi-label">Proyección futura</div><div class="kpi-value" style="color:var(--violet)">$'+fmt(proyeccionTotal)+'</div><div class="kpi-sub">próximos 5 meses</div><div class="kpi-icon">🔮</div></div>'

    +'</div>'

  // ══ GRÁFICO PRINCIPAL: Ingresos reales + Proyección ══════════════════
  h+='<div class="chart-wrap" style="margin-bottom:16px">'
    +'<div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px">'

    // ── CHART: two independent rows (real top, projected bottom) ──

    +'<div style="margin-bottom:4px">'
    +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'

    +'<span style="font-size:10px;font-weight:700;color:var(--text3)">COBRADO REAL (escala: $'+fmt(maxReal)+')</span>'

    +'<div style="display:flex;align-items:flex-end;gap:2px;height:90px;background:#f8faff;border-radius:8px;padding:6px 6px 0">'
    +allMonths.map(m=>{
      const pct=m.real>0?Math.max(Math.round(m.real/maxReal*100),4):0
      const isC=m.isCurrent
      const col=isC?'var(--brand)':m.isPast?'rgba(26,86,219,.6)':'#e2e8f0'
      return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:1px">'
        +(pct>0?'<div style="font-size:8px;color:'+(isC?'var(--brand)':'var(--text3)')+';font-weight:700">$'+fmt(m.real)+'</div>':'')
        +'<div title="Cobrado: $'+m.real+'" style="width:80%;min-height:'+(pct>0?pct:1)+'%;border-radius:3px 3px 0 0;background:'+col+';transition:height .4s"></div>'
        +'</div>'
    }).join('')
    +'</div></div>'

    // Row 2: Proyectado — scale = maxProj
    +'<div style="margin-bottom:4px">'
    +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">'
    +'<span style="width:10px;height:10px;border-radius:2px;background:var(--violet);opacity:.7;display:inline-block"></span>'
    +'<span style="font-size:10px;font-weight:700;color:var(--text3)">PROYECCIÓN (escala: $'+fmt(maxProj)+')</span>'
    +'</div>'
    +'<div style="display:flex;align-items:flex-end;gap:2px;height:70px;background:#faf8ff;border-radius:8px;padding:6px 6px 0">'
    +allMonths.map(m=>{
      const pct=m.proj>0?Math.max(Math.round(m.proj/maxProj*100),4):0
      const col=m.isFuture?'rgba(126,58,242,.5)':m.isCurrent?'rgba(126,58,242,.3)':'rgba(200,200,200,.4)'
      const brd=m.isFuture?'2px dashed var(--violet)':'1px dashed #c4b5fd'
      return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;gap:1px">'

        +'<div title="Proyectado: $'+m.proj+'" style="width:80%;min-height:'+(pct>0?pct:1)+'%;border-radius:3px 3px 0 0;background:'+col+';border:'+brd+';border-bottom:none;transition:height .4s"></div>'

    +'</div></div>'

    // Month labels (shared)
    +'<div style="display:flex;gap:2px;margin-top:4px">'
    +allMonths.map(m=>'<div style="flex:1;text-align:center;font-size:9px;font-weight:'+(m.isCurrent?700:500)+';color:'+(m.isCurrent?'var(--brand)':m.isFuture?'var(--violet)':'var(--text3)')+'">'+m.label+(m.isCurrent?' ●':'')+'</div>').join('')
    +'</div>'
    +'</div>'

    // Summary row
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-top:16px;padding-top:14px;border-top:1px solid #f1f5f9">'
    +'<div style="text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">Cobrado (6 meses)</div><div style="font-size:18px;font-weight:800;color:var(--brand)">$'+fmt(pastMonths.reduce((s,x)=>s+x.real,0))+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">Mes actual</div><div style="font-size:18px;font-weight:800;color:var(--brand)">$'+fmt(ingresoMesActual)+'</div><div style="font-size:11px;color:'+(variacion>=0?'var(--green)':'var(--red)')+'">'+( variacion>=0?'▲':'▼')+Math.abs(variacion)+'% vs anterior</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">Proyección total</div><div style="font-size:18px;font-weight:800;color:var(--violet)">$'+fmt(proyeccionTotal)+'</div></div>'
    +'<div style="text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:3px">Mejor mes futuro</div><div style="font-size:18px;font-weight:800;color:var(--violet)">'+mejorMesFuturo.label+'</div><div style="font-size:11px;color:var(--text3)">$'+fmt(mejorMesFuturo.proj)+'</div></div>'
    +'</div>'
    +'</div>'

  // ── Proyección detallada por mes ──
  if(futureMonths.some(x=>x.proj>0)){
    h+='<div class="chart-wrap" style="margin-bottom:16px">'
      +'<div class="chart-title">Detalle de cobros proyectados</div>'
      +'<div class="chart-sub">Cuotas pendientes y parciales por mes de vencimiento</div>'
      +'<table style="margin-top:8px"><thead><tr><th>Mes</th><th style="text-align:right">Monto proyectado</th><th>Cuotas</th><th style="text-align:right">% del total pendiente</th><th>Progreso</th></tr></thead><tbody>'
    futureMonths.forEach(m=>{
      if(!m.proj&&!cuotas.filter(c=>{const dv=new Date(c.fechaVencimiento||'');return dv.getMonth()===m.m&&dv.getFullYear()===m.y&&cStat(c)!=='pagado'}).length)return
      const nCuotas=cuotas.filter(c=>{const dv=new Date(c.fechaVencimiento||'');return dv.getMonth()===m.m&&dv.getFullYear()===m.y&&cStat(c)!=='pagado'}).length
      const pct=pendiente>0?Math.round(m.proj/pendiente*100):0
      h+='<tr>'
        +'<td><strong>'+MESES_FULL[m.m]+' '+m.y+'</strong></td>'
        +'<td style="text-align:right;font-weight:700;color:var(--violet)">$'+fmt(m.proj)+'</td>'
        +'<td><span class="b bv">'+nCuotas+' cuota'+(nCuotas!==1?'s':'')+'</span></td>'
        +'<td style="text-align:right;color:var(--text3)">'+pct+'%</td>'
        +'<td style="width:120px"><div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:var(--violet)"></div></div></td>'
        +'</tr>'
    })
    h+='</tbody></table></div>'
  }

  // ── Donut + Estado trabajos ──
  h+='<div class="dash-grid">'

  // Donut cuotas
  function donutSvg(segs,total,cx,cy,r){
    if(!total)return'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#f1f5f9" stroke-width="18"/>'
    let angle=-90,svg=''
    segs.forEach(([val,color])=>{
      if(!val)return
      const sweep=val/total*360,rad=Math.PI/180
      const x1=cx+r*Math.cos(angle*rad),y1=cy+r*Math.sin(angle*rad)
      angle+=sweep
      const x2=cx+r*Math.cos(angle*rad),y2=cy+r*Math.sin(angle*rad)
      svg+=`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${sweep>180?1:0} 1 ${x2} ${y2} Z" fill="${color}" opacity=".9"/>`
    })
    svg+=`<circle cx="${cx}" cy="${cy}" r="${r*.55}" fill="white"/>`
    return svg
  }
  const cuotaSegs=Object.entries(cuotaDist).map(([k,v])=>[v,cuotaColors[k]])

      const pct=cuotas.length>0?Math.round(v/cuotas.length*100):0
      return'<div class="donut-item"><div class="donut-dot" style="background:'+cuotaColors[k]+'"></div>'

        +'</div>'

  if(actTrab.length){actTrab.forEach(t=>{const bal=wBal(t);h+='<tr><td><strong style="font-size:12px">'+esc(t.titulo.slice(0,30))+(t.titulo.length>30?'…':'')+'</strong></td>'+'<td>'+bdg(t.estado||'Nuevo',{Completado:'green','En progreso':'blue',Revisión:'amber',Cancelado:'gray'}[t.estado]||'amber')+'</td>'+'<td><div style="display:flex;align-items:center;gap:6px"><div class="pbar" style="width:60px"><div class="pbar-f" style="width:'+bal.pct+'%;background:'+(bal.pct===100?'var(--green)':'var(--brand)')+'"></div></div><span style="font-size:11px;color:var(--text3)">'+bal.pct+'%</span></div></td></tr>'})}
  else h+='<tr><td colspan="3" class="empty">Sin trabajos activos</td></tr>'
  h+='</tbody></table></div>'
  h+='</div>'

  return h
}
function htmlClientes(){

    +'<button class="btn btn-p" onclick="openModal(\'cliente\',null)">+ Nuevo cliente</button></div>'
  h+='<div class="card"><table><thead><tr><th>Nombre</th><th>Institución</th><th>Ciudad</th><th>Teléfono</th><th>Email</th><th>Trabajos</th><th></th></tr></thead><tbody>'
  if(list.length){list.forEach(c=>{
    const trabsC=data.trabajos.filter(t=>t.clienteId===c.id)
    const nT=trabsC.length
    const isExpC=(wExp===('c_'+c.id))
    const cuotasC=data.cuotas.filter(q=>trabsC.some(t=>t.id===q.trabajoId))
    const pagadoC=cuotasC.reduce((s,q)=>s+parseFloat(q.pagado||0),0)
    const saldoC=cuotasC.reduce((s,q)=>s+(parseFloat(q.acordado||0)-parseFloat(q.pagado||0)),0)
    const venceC=cuotasC.filter(q=>cStat(q)==='vencido').length
    h+='<tr style="cursor:pointer" onclick="wExp=wExp===\'c_'+c.id+'\'\'?null:\'c_'+c.id+'\';draw()">'
      +'<td><strong>'+esc(c.nombre)+'</strong>'+(c.cedula?'<div style="font-size:11px;color:var(--text3)">'+esc(c.cedula)+'</div>':'')+'</td>'
      +'<td style="color:var(--text3);font-size:12px">'+esc(c.institucion||'—')+'</td>'
      +'<td style="color:var(--text3);font-size:12px">'+esc(c.ciudad||'—')+'</td>'
      +'<td>'+(c.telefono?'<a href="'+waUrl(c.telefono,'Hola '+c.nombre)+'" target="_blank" class="btn btn-wa btn-sm" style="text-decoration:none;font-size:11px" onclick="event.stopPropagation()">💬 '+esc(c.telefono)+'</a>':'<span style="color:var(--text3)">—</span>')+'</td>'
      +'<td style="color:var(--text3);font-size:12px">'+esc(c.email||'—')+'</td>'
      +'<td>'+(nT>0?'<div style="font-size:12px;line-height:1.6">'
        +'<div style="font-weight:700;color:var(--brand)">'+nT+' trabajo'+(nT!==1?'s':'')+'</div>'
        +(saldoC>0?'<div style="font-size:11px;color:'+(venceC>0?'#dc2626':'var(--amber)')+'">'+(venceC>0?'⚠️ ':'')+'$'+fmt(saldoC)+' saldo</div>':'')
        +(pagadoC>0?'<div style="font-size:11px;color:var(--green)">$'+fmt(pagadoC)+' cobrado</div>':'')
        +'</div>':'<span style="color:var(--text3);font-size:12px">Sin trabajos</span>')+'</td>'
      +'<td onclick="event.stopPropagation()"><span style="display:flex;gap:4px;flex-wrap:wrap">'
      +'<button class="btn btn-g btn-sm" title="Portal" onclick="gestionarPortalCliente(\''+c.id+'\')" style="font-size:11px">👤</button>'
      +'<button class="btn btn-g btn-sm" title="Reporte" onclick="descargarReporte(\''+c.id+'\')" >📄</button>'
      +'<button class="btn btn-g btn-sm" onclick="openModal(\'cliente\','+jss(c)+')">✏️</button>'
      +'<button class="btn btn-r btn-sm" onclick="delRec(\'Clientes\',\''+c.id+'\',\'¿Eliminar?\')">🗑</button>'
      +'</span></td>'
      +(isExpC?'<td colspan="1" style="color:var(--text3);font-size:12px">'+(isExpC?'▲':'▼')+'</td>':'<td></td>')
      +'</tr>'
    // Expanded row: all trabajos with balances
    if(isExpC&&nT>0){
      h+='<tr><td colspan="7" style="padding:0;background:#f8fafc;border-top:2px solid var(--brand)">'

        +'<th style="padding:5px 8px;text-align:center">Cuotas</th>'
        +'<th></th></tr></thead><tbody>'
      trabsC.forEach(t=>{
        const bal=wBal(t)
        const sc={Completado:'#15803d','En progreso':'#1d4ed8',Revisión:'#b45309',Cancelado:'#94a3b8',Nuevo:'#6366f1'}
        const stC=sc[t.estado]||'#64748b'
        const cuotasT=data.cuotas.filter(q=>q.trabajoId===t.id)
        const vT=cuotasT.filter(q=>cStat(q)==='vencido').length

          +'<td style="padding:6px 8px;text-align:right;font-weight:700;color:'+(vT>0?'#dc2626':'var(--amber)')+'">$'+fmt(bal.bal)+'</td>'

          +'<td style="padding:6px 8px"><button class="btn btn-g btn-sm" onclick="page=\'trabajos\';wExp=\''+t.id+'\';draw()">Ver →</button></td>'
          +'</tr>'
        // Show abonos for this trabajo
        const absT=data.abonos.filter(function(a){return a.trabajoId===t.id})
        if(absT.length){
          h+='<tr><td colspan="7" style="padding:5px 20px 8px;background:#f0fdf4">'
            +'<div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center">'
            +'<span style="font-size:10px;font-weight:700;color:#15803d;margin-right:4px">💳 Pagos:</span>'
          absT.forEach(function(a){
            h+='<span style="background:#fff;border:1px solid #bbf7d0;border-radius:6px;padding:3px 8px;font-size:11px">'
              +'<strong style="color:var(--green)">$'+fmt(a.monto)+'</strong>'
              +' '+fmtDCorto(a.fecha||'')
              +(a.comprobante?' <span style="color:#0369a1;font-weight:600">'+esc(a.comprobante)+'</span>':'')
              +(a.nota?' <span style="color:var(--text3)">'+esc(a.nota)+'</span>':'')
              +'</span>'
          })
          h+='</div></td></tr>'
        }
      })
      h+='</tbody></table></div></td></tr>'
    }
  })}else h+='<tr><td colspan="7" class="empty">Sin clientes registrados</td></tr>'
  h+='</tbody></table></div>'
  return h
}

            h+='<div style="border-top:1px solid '+bdc+';padding:8px 13px">'

// ─── COBROS ───────────────────────────────────────────────────────────────────
function htmlCobros(){
  const q=search.toLowerCase()
  const rows=data.cuotas.map(c=>{
    const t=data.trabajos.find(x=>x.id===c.trabajoId)
    const cl=t?data.clientes.find(x=>x.id===t.clienteId):null
    const st=cStat(c)
    return{...c,_t:t,_cl:cl,_st:st}
  }).filter(c=>{
    // Skip cuotas with no trabajo asociado (huérfanas)
    if(!c._t)return false
    // Skip if no client info at all
    if(!c._cl&&!(c.clienteNombre||c._t.clienteNombre))return false
    // Apply filters
    const nameMatch=(c._cl&&c._cl.nombre||c.clienteNombre||'')+(c._t&&c._t.titulo||c.trabajoTitulo||'')
    return(cSt==='Todos'||cSt===c._st)&&(!q||nameMatch.toLowerCase().includes(q))
  })
    .sort((a,b)=>{const o={vencido:0,parcial:1,pendiente:2,pagado:3};return o[a._st]-o[b._st]||new Date(a.fechaVencimiento)-new Date(b.fechaVencimiento)})

  const cobrado=data.abonos.reduce((s,a)=>s+parseFloat(a.monto||0),0)
  const pendiente=data.cuotas.filter(c=>cStat(c)!=='pagado').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const vencido=data.cuotas.filter(c=>cStat(c)==='vencido').reduce((s,c)=>s+(parseFloat(c.acordado||0)-parseFloat(c.pagado||0)),0)
  const total=data.cuotas.reduce((s,c)=>s+parseFloat(c.acordado||0),0)

  let h='<div class="kpis">'
    +'<div class="kpi" style="cursor:pointer" onclick="cSt=\'Todos\';draw()"><div class="kpi-label">Total facturado</div><div class="kpi-value">$'+fmt(total)+'</div><div class="kpi-sub">'+data.cuotas.length+' cuotas</div><div class="kpi-icon">📋</div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="cSt=\'pagado\';draw()"><div class="kpi-label">Cobrado</div><div class="kpi-value" style="color:var(--green)">$'+fmt(cobrado)+'</div><div class="kpi-sub">clic para ver pagadas</div><div class="kpi-icon">✅</div></div>'
    +'<div class="kpi" style="cursor:pointer" onclick="cSt=\'pendiente\';draw()"><div class="kpi-label">Por cobrar</div><div class="kpi-value" style="color:var(--amber)">$'+fmt(pendiente)+'</div><div class="kpi-sub">clic para ver pendientes</div><div class="kpi-icon">⏰</div></div>'
    +(vencido>0?'<div class="kpi" style="cursor:pointer;animation:pulse 2s infinite" onclick="cSt=\'vencido\';draw()"><div class="kpi-label">⚠️ Vencido</div><div class="kpi-value" style="color:var(--red)">$'+fmt(vencido)+'</div><div class="kpi-sub">clic para ver vencidas</div><div class="kpi-icon">🚨</div></div>':'')
    +'</div>'
  h+='<div class="tb"><input placeholder="Buscar..." oninput="search=this.value;draw()" value="'+esc(search)+'" style="max-width:240px"/>'
    +['Todos','vencido','pendiente','parcial','pagado'].map(s=>'<button class="btn btn-sm '+(cSt===s?'btn-p':'btn-g')+'" onclick="cSt=\''+s+'\';draw()">'+s.charAt(0).toUpperCase()+s.slice(1)+'</button>').join('')
    +'<button class="btn btn-g btn-sm" style="margin-left:auto" onclick="exportCobros()">⬇ CSV</button></div>'
    +htmlCobrosFilterBadge()
  if(!rows.length)return h+'<div class="card"><p class="empty">Sin resultados</p></div>'
  rows.forEach(c=>{
    const st=c._st,saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
    const today=new Date(),due=new Date(c.fechaVencimiento)
    const days=Math.ceil((due-today)/86400000)
    const bgc={pagado:'#dcfce7',parcial:'#dbeafe',vencido:'#fee2e2',pendiente:'#fef3c7'}[st]||'#f9fafb'
    const bdc={pagado:'#bbf7d0',parcial:'#bfdbfe',vencido:'#fecaca',pendiente:'#fde68a'}[st]||'#e2e8f0'

function waRec(cuotaId,trabajoId,phone,tplId){
  const c=data.cuotas.find(x=>x.id===cuotaId)
  const t=data.trabajos.find(x=>x.id===trabajoId)
  const cl=t?data.clientes.find(x=>x.id===t.clienteId):null
  if(!c||!phone)return
  const saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
  // Total saldo pendiente del trabajo
  const cuotasTrabajo=data.cuotas.filter(x=>x.trabajoId===trabajoId)
  const saldoTotal=cuotasTrabajo.reduce(function(s,x){return s+(parseFloat(x.acordado||0)-parseFloat(x.pagado||0))},0)
  const msg=waTpl(tplId,{
    nombre:cl&&cl.nombre||'',
    trabajo:t&&t.titulo||'',
    cuota:c.label||'',
    monto:fmt(c.acordado),
    pagado:fmt(c.pagado||0),
    saldo:fmt(saldo),
    saldo_total:fmt(saldoTotal),
    fecha:c.fechaVencimiento||''
  })
  window.open(waUrl(phone,msg),'_blank')
}

function calUrl(r,clName){
  const tt=encodeURIComponent((r.titulo||'Reunión')+(clName?' — '+clName:''))
  const fechaISO=toISO(r.fecha||'')
  const dt=fechaISO.replace(/-/g,'')
  const horaClean=cleanHora(r.hora)
  const [hh,mm]=(horaClean!=='—'?horaClean:'10:00').split(':')
  const eh=String(parseInt(hh)+1).padStart(2,'0')
  const mmPad=(mm||'00').padStart(2,'0')
  return'https://calendar.google.com/calendar/r/eventedit?text='+tt+'&dates='+dt+'T'+hh+mmPad+'00/'+dt+'T'+eh+mmPad+'00&location='+encodeURIComponent(r.link||'')+'&details='+encodeURIComponent('Research Assesor\n'+(r.link||''))
}
function waMeet(rid){
  const r=data.reuniones.find(x=>x.id===rid)
  const cl=r?data.clientes.find(x=>x.id===r.clienteId):null
  if(!r||!(cl&&cl.telefono))return
  // Format fecha and hora safely before sending to template
  const fechaFmt=fmtD(r.fecha||'')
  const horaFmt=cleanHora(r.hora)
  const msg=waTpl('meeting',{nombre:cl.nombre||'',fecha:fechaFmt,hora:horaFmt,plat:r.plataforma||'',link:r.link||''})
  window.open(waUrl(cl.telefono,msg),'_blank')
}
async function genMeet(titulo,fecha,hora){
  // Try Apps Script createMeet action
  try{
    const url=API+'?action=createMeet&title='+encodeURIComponent(titulo)
      +'&date='+encodeURIComponent(fecha||'')
      +'&time='+encodeURIComponent(hora||'10:00')
      +'&duration=60&t='+Date.now()
    const r=await fetch(url)
    const text=await r.text()
    const jsonStr=text.replace(/^[^(]+\((.+)\)\s*;?\s*$/,'$1').trim()
    let d
    try{d=JSON.parse(jsonStr||text)}catch(e){d=null}
    if(d&&d.ok&&d.meetLink)return d.meetLink
    // If script doesn't support createMeet yet, throw specific error
    if(d&&d.error&&d.error.includes('desconocida')){
      throw new Error('NEEDS_REDEPLOY')
    }
    if(d&&d.error)throw new Error(d.error)
  }catch(fe){
    if(fe.message==='NEEDS_REDEPLOY'||fe.name==='TypeError'){
      throw new Error('NEEDS_REDEPLOY')
    }
    throw fe
  }
  throw new Error('Sin enlace Meet en la respuesta del servidor.')
}

function previewPlan(){
  const total=parseFloat((document.getElementById('f4')||{}).value||0)
  const n=parseInt((document.getElementById('tp_n')||{}).value||1)
  const d=(document.getElementById('tp_d')||{}).value
  const el=document.getElementById('pprev');if(!el)return
  if(!total||!n){el.innerHTML='<em>Ingresa el valor total para ver el plan</em>';return}
  const pc=Math.floor(total*100/n)/100,last=Math.round((total-pc*(n-1))*100)/100
  let h='Plan: '
  for(let i=0;i<Math.min(n,5);i++){
    const dt=new Date(d||new Date());dt.setMonth(dt.getMonth()+i)
    const lb=i===0?'Anticipo':'Cuota '+(i+1)+(i===n-1&&n>1?' (final)':'')
    h+='<span style="background:#dbeafe;color:var(--brand);border-radius:4px;padding:2px 6px;margin:2px;font-size:11px;display:inline-block">'+lb+' $'+fmt(i===n-1?last:pc)+' · '+dt.toISOString().split('T')[0]+'</span>'
  }
  if(n>5)h+='<em style="color:var(--text3)"> ...y '+(n-5)+' más</em>'
  el.innerHTML=h
}
async function submitTrabajo(id,isEdit){
  const titulo=v('f0'),clienteId=v('f1')
  if(!titulo){alert('Título obligatorio');return}
  if(!clienteId){alert('Selecciona un cliente');return}
  const cl=data.clientes.find(c=>c.id===clienteId)
  const total=parseFloat(v('f4'))||0
  const workId=id||uid()
  const rec={id:workId,clienteId,clienteNombre:cl&&cl.nombre||'',titulo,tipo:v('f2'),estado:v('f3'),total,progreso:v('f5'),fechaInicio:v('f6'),fechaFin:v('f7'),notas:v('f8'),carpeta:v('f9'),createdAt:id?(modal.rec.createdAt||''):new Date().toISOString()}
  // Capture plan values BEFORE draw() clears the modal inputs
  const planN=parseInt(v('tp_n'))||1
  const planD=v('tp_d')||new Date().toISOString().split('T')[0]
  const planManual=document.getElementById('plan_manual')
  const usaManual=planManual&&planManual.style.display!=='none'
  const crearCuotas=!isEdit&&(total>0||usaManual)
  await saveRec('Trabajos',rec,!id)
  if(crearCuotas){
    let cuotasACrear=[]
    if(usaManual){
      // Cuotas manuales
      cuotasACrear=getCuotasManual()
      if(cuotasACrear.length===0){await loadData();return}
    }else{
      // Cuotas automáticas
      const pc=Math.floor(total*100/planN)/100
      const last=Math.round((total-pc*(planN-1))*100)/100
      for(let i=0;i<planN;i++){
        const dt=new Date(planD);dt.setMonth(dt.getMonth()+i)
        const lb=i===0?'Anticipo':'Cuota '+(i+1)+(i===planN-1&&planN>1?' (final)':'')
        cuotasACrear.push({label:lb,monto:i===planN-1?last:pc,fecha:dt.toISOString().split('T')[0]})
      }
    }
    toast('Creando '+cuotasACrear.length+' cuota'+(cuotasACrear.length>1?'s':'')+'...')
    for(let i=0;i<cuotasACrear.length;i++){
      const c=cuotasACrear[i]
      await apiPost({action:'insertar',tabla:'Cuotas',fila:{
        id:uid(),trabajoId:workId,
        clienteId:clienteId,
        clienteNombre:cl&&cl.nombre||'',
        trabajoTitulo:titulo,
        label:c.label,
        fechaVencimiento:c.fecha,
        acordado:c.monto,
        pagado:0,estado:'pendiente'
      }})
    }
    await loadData()
    toast('✓ Trabajo y '+cuotasACrear.length+' cuota'+(cuotasACrear.length>1?'s':'')+' creadas')
  }
}

function submitReunion(id){
  const titulo=v('r0');if(!titulo){alert('Título obligatorio');return}
  const fechaVal=toISO(v('r3')||'')||v('r3')
  if(!fechaVal){alert('Fecha obligatoria');return}
  const hora=v('r4').slice(0,5)||'10:00'
  const rec={id:id||uid(),titulo,clienteId:v('r1'),trabajoId:v('r2'),fecha:fechaVal,hora:hora,plataforma:v('r5'),link:v('r6'),notas:v('r7')}
  saveRec('Reuniones',rec,!id)
}

function submitUsuario(id){
  const nombre=v('u0'),usr=v('u1'),pass=v('u2'),rol=v('u3')
  if(!nombre||!usr||!pass){alert('Completa todos los campos');return}
  const users=(window._appUsers||USERS).slice()
  if(id){const idx=users.findIndex(u=>u.id===id);if(idx>-1)users[idx]=Object.assign({},users[idx],{name:nombre,u:usr,username:usr,p:pass,password:pass,role:rol})}
  else users.push({id:uid(),name:nombre,u:usr,username:usr,p:pass,password:pass,role:rol})
  window._appUsers=users;modal=null;draw();toast(id?'Actualizado ✓':'Creado ✓')
}

// ── Generador Word (JSZip) ────────────────────────────────────────
function descargarReporte(clienteId){
  const cl=data.clientes.find(x=>x.id===clienteId)
  if(!cl){toast('Cliente no encontrado','err');return}
  const trabajosCl=data.trabajos.filter(t=>t.clienteId===clienteId)
  if(!trabajosCl.length){toast('Este cliente no tiene trabajos registrados','err');return}
  _cargarJSZip(function(){_generarDocx(cl,trabajosCl,'cliente')})
}

function descargarReporteTrabajo(trabajoId){
  const t=data.trabajos.find(x=>x.id===trabajoId)
  if(!t){toast('Trabajo no encontrado','err');return}
  const cl=data.clientes.find(x=>x.id===t.clienteId)
  _cargarJSZip(function(){_generarDocx(cl,[t],'trabajo')})
}

function _cargarJSZip(cb){
  if(window.JSZip){cb();return}
  toast('Preparando descarga...')
  const s=document.createElement('script')
  s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js'
  s.onload=function(){cb()}
  s.onerror=function(){toast('Error cargando JSZip — verifica conexión','err')}
  document.head.appendChild(s)
}

function _xml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}
function _fmtM(n){return'$'+(parseFloat(n)||0).toFixed(2)}
function _fmtFecha(){
  const d=new Date()
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear()
}

function _p(text,opts){
  opts=opts||{}
  const sz=opts.sz||22
  const bold=opts.bold?'<w:b/>':''
  const color=opts.color?'<w:color w:val="'+opts.color+'"/>' : ''
  const before=opts.before||0
  const after=opts.after!==undefined?opts.after:80
  const align=opts.align?'<w:jc w:val="'+opts.align+'"/>':''
  return'<w:p><w:pPr><w:spacing w:before="'+before+'" w:after="'+after+'"/>'+align+'</w:pPr>'
    +'<w:r><w:rPr>'+bold+'<w:sz w:val="'+sz+'"/><w:szCs w:val="'+sz+'"/><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/>'+color+'</w:rPr>'
    +'<w:t xml:space="preserve">'+_xml(text)+'</w:t></w:r></w:p>'
}

function _hline(){
  return'<w:p><w:pPr><w:spacing w:before="120" w:after="60"/>'
    +'<w:pBdr><w:bottom w:val="single" w:sz="4" w:space="1" w:color="1E6FC8"/></w:pBdr>'
    +'</w:pPr></w:p>'
}

function _tblStart(widths){
  const total=widths.reduce(function(s,w){return s+w},0)
  return'<w:tbl><w:tblPr><w:tblStyle w:val="TableGrid"/><w:tblW w:w="'+total+'" w:type="dxa"/>'
    +'<w:tblBorders><w:top w:val="single" w:sz="2" w:space="0" w:color="CCCCCC"/>'
    +'<w:left w:val="single" w:sz="2" w:space="0" w:color="CCCCCC"/>'
    +'<w:bottom w:val="single" w:sz="2" w:space="0" w:color="CCCCCC"/>'
    +'<w:right w:val="single" w:sz="2" w:space="0" w:color="CCCCCC"/>'
    +'<w:insideH w:val="single" w:sz="2" w:space="0" w:color="CCCCCC"/>'
    +'<w:insideV w:val="single" w:sz="2" w:space="0" w:color="CCCCCC"/>'
    +'</w:tblBorders></w:tblPr>'
    +'<w:tblGrid>'+widths.map(function(w){return'<w:gridCol w:w="'+w+'"/>'}).join('')+'</w:tblGrid>'
}

function _cell(text,w,opts){
  opts=opts||{}
  const fill=opts.head?'1E6FC8':opts.gray?'F5F7FA':'FFFFFF'
  const txtColor=opts.head?'FFFFFF':(opts.color||'000000')
  const bold=(opts.head||opts.bold)?'<w:b/>':''
  const sz=opts.sz||20
  const align=opts.align||'left'
  return'<w:tc><w:tcPr><w:tcW w:w="'+w+'" w:type="dxa"/>'
    +'<w:shd w:val="clear" w:color="auto" w:fill="'+fill+'"/>'
    +'<w:tcMar><w:top w:w="80" w:type="dxa"/><w:left w:w="120" w:type="dxa"/>'
    +'<w:bottom w:w="80" w:type="dxa"/><w:right w:w="120" w:type="dxa"/></w:tcMar>'
    +'</w:tcPr><w:p><w:pPr><w:jc w:val="'+align+'"/>'
    +'<w:spacing w:before="0" w:after="0"/></w:pPr>'
    +'<w:r><w:rPr>'+bold+'<w:sz w:val="'+sz+'"/><w:szCs w:val="'+sz+'"/>'
    +'<w:rFonts w:ascii="Arial" w:hAnsi="Arial"/>'
    +'<w:color w:val="'+txtColor+'"/></w:rPr>'
    +'<w:t xml:space="preserve">'+_xml(text)+'</w:t></w:r></w:p></w:tc>'
}

function _generarDocx(cl,trabajos,modo){
  const cuotasByTrabajo={}
  data.cuotas.forEach(function(c){
    if(!cuotasByTrabajo[c.trabajoId])cuotasByTrabajo[c.trabajoId]=[]
    cuotasByTrabajo[c.trabajoId].push(c)
  })
  const fecha=_fmtFecha()
  let body=''

  // Cabecera
  body+=_p('Research Assesor',{sz:28,bold:true,color:'1E6FC8',align:'right',before:0,after:40})
  body+=_p('Coordinación de Investigación',{sz:18,color:'555555',align:'right',after:20})
  body+=_p('Fecha: '+fecha,{sz:18,color:'555555',align:'right',after:0})
  body+=_hline()
  body+=_p('RESUMEN DE TRABAJOS Y PLAN DE PAGOS',{sz:28,bold:true,color:'1E6FC8',align:'center',before:80,after:60})

  // Datos del cliente
  body+=_p('DATOS DEL CLIENTE',{sz:24,bold:true,color:'1E6FC8',before:100,after:40})
  body+=_hline()
  const campos=[
    ['Nombre',cl&&cl.nombre||'—'],['Cédula / RUC',cl&&cl.cedula||'—'],
    ['Teléfono',cl&&cl.telefono||'—'],['Email',cl&&cl.email||'—'],
    ['Institución',cl&&cl.institucion||'—'],['Ciudad',cl&&cl.ciudad||'—'],
    ['Dirección',cl&&cl.direccion||'—']
  ].filter(function(r){return r[1]&&r[1]!=='—'})
  if(campos.length){
    body+=_tblStart([2200,4000,2200,4000])
    for(var ci=0;ci<campos.length;ci+=2){
      body+='<w:tr>'
      body+=_cell(campos[ci][0],2200,{bold:true,gray:true})
      body+=_cell(campos[ci][1],4000,{})
      if(campos[ci+1]){
        body+=_cell(campos[ci+1][0],2200,{bold:true,gray:true})
        body+=_cell(campos[ci+1][1],4000,{})
      }else{
        body+=_cell('',6200,{})
      }
      body+='</w:tr>'
    }
    body+='</w:tbl><w:p><w:pPr><w:spacing w:before="0" w:after="100"/></w:pPr></w:p>'
  }

  // Tabla de trabajos
  body+=_p('TRABAJOS',{sz:24,bold:true,color:'1E6FC8',before:100,after:40})
  body+=_hline()
  body+=_tblStart([400,3800,2000,1500,1500,1500,1700])
  body+='<w:tr>'
  body+=_cell('N°',400,{head:true,align:'center'})
  body+=_cell('Trabajo / Servicio',3800,{head:true})
  body+=_cell('Tipo',2000,{head:true})
  body+=_cell('Estado',1500,{head:true})
  body+=_cell('Total',1500,{head:true,align:'right'})
  body+=_cell('Cobrado',1500,{head:true,align:'right'})
  body+=_cell('Saldo',1700,{head:true,align:'right'})
  body+='</w:tr>'
  var gTotal=0,gCob=0
  trabajos.forEach(function(t,i){
    const cs=cuotasByTrabajo[t.id]||[]
    const cob=cs.reduce(function(s,c){return s+parseFloat(c.pagado||0)},0)
    const tot=parseFloat(t.total||0)
    const sal=tot-cob
    gTotal+=tot;gCob+=cob
    const gray=i%2!==0
    body+='<w:tr>'
    body+=_cell(String(i+1),400,{gray:gray,align:'center'})
    body+=_cell(t.titulo,3800,{gray:gray})
    body+=_cell(t.tipo||'—',2000,{gray:gray})
    body+=_cell(t.estado||'—',1500,{gray:gray})
    body+=_cell(_fmtM(tot),1500,{gray:gray,align:'right'})
    body+=_cell(_fmtM(cob),1500,{gray:gray,align:'right',color:cob>0?'15803D':'000000'})
    body+=_cell(_fmtM(sal),1700,{gray:gray,align:'right',color:sal>0?'B45309':'15803D',bold:sal>0})
    body+='</w:tr>'
  })
  body+='<w:tr>'
  body+=_cell('',400,{gray:true})
  body+=_cell('TOTAL',3800,{bold:true,gray:true})
  body+=_cell('',2000,{gray:true})
  body+=_cell('',1500,{gray:true})
  body+=_cell(_fmtM(gTotal),1500,{bold:true,gray:true,align:'right'})
  body+=_cell(_fmtM(gCob),1500,{bold:true,gray:true,align:'right',color:'15803D'})
  body+=_cell(_fmtM(gTotal-gCob),1700,{bold:true,gray:true,align:'right',color:'B45309'})
  body+='</w:tr></w:tbl>'
  body+='<w:p><w:pPr><w:spacing w:before="0" w:after="100"/></w:pPr></w:p>'

  // Plan de pagos por trabajo
  body+=_p('PLAN DE PAGOS PROYECTADO',{sz:24,bold:true,color:'1E6FC8',before:100,after:40})
  body+=_hline()
  trabajos.forEach(function(t){
    const cs=(cuotasByTrabajo[t.id]||[]).slice().sort(function(a,b){return new Date(a.fechaVencimiento)-new Date(b.fechaVencimiento)})
    if(!cs.length)return
    body+=_p(t.titulo,{sz:22,bold:true,color:'1E6FC8',before:100,after:30})
    body+=_tblStart([2500,2000,2000,2000,2000,1900])
    body+='<w:tr>'
    body+=_cell('Cuota',2500,{head:true})
    body+=_cell('Vencimiento',2000,{head:true,align:'center'})
    body+=_cell('Acordado',2000,{head:true,align:'right'})
    body+=_cell('Pagado',2000,{head:true,align:'right'})
    body+=_cell('Saldo',2000,{head:true,align:'right'})
    body+=_cell('Estado',1900,{head:true,align:'center'})
    body+='</w:tr>'
    var tA=0,tP=0
    cs.forEach(function(c,i){
      const ac=parseFloat(c.acordado||0),pa=parseFloat(c.pagado||0),sa=ac-pa
      const st=c.estado||'pendiente'
      tA+=ac;tP+=pa
      const gray=i%2!==0
      const sc=st==='pagado'?'15803D':st==='vencido'?'DC2626':'B45309'
      body+='<w:tr>'
      body+=_cell(c.label||'Cuota',2500,{gray:gray})
      body+=_cell(c.fechaVencimiento||'—',2000,{gray:gray,align:'center'})
      body+=_cell(_fmtM(ac),2000,{gray:gray,align:'right'})
      body+=_cell(_fmtM(pa),2000,{gray:gray,align:'right',color:pa>0?'15803D':'555555'})
      body+=_cell(_fmtM(sa),2000,{gray:gray,align:'right',color:sa>0?'B45309':'15803D'})
      body+=_cell(st.toUpperCase(),1900,{gray:gray,align:'center',color:sc,bold:true})
      body+='</w:tr>'
    })
    body+='<w:tr>'
    body+=_cell('SUBTOTAL',2500,{bold:true,gray:true})
    body+=_cell('',2000,{gray:true})
    body+=_cell(_fmtM(tA),2000,{bold:true,gray:true,align:'right'})
    body+=_cell(_fmtM(tP),2000,{bold:true,gray:true,align:'right',color:'15803D'})
    body+=_cell(_fmtM(tA-tP),2000,{bold:true,gray:true,align:'right',color:'B45309'})
    body+=_cell('',1900,{gray:true})
    body+='</w:tr></w:tbl>'
    body+='<w:p><w:pPr><w:spacing w:before="0" w:after="80"/></w:pPr></w:p>'
  })

  // Pie
  body+=_hline()
  body+=_p('Documento generado por Research Assesor · '+fecha,{sz:16,color:'999999',align:'center',before:80,after:0})
  body+='<w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="720" w:header="708" w:footer="708" w:gutter="0"/></w:sectPr>'

  // Ensamblar DOCX con JSZip
  const zip=new window.JSZip()
  zip.file('[Content_Types].xml','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>')
  zip.folder('_rels').file('.rels','<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>')
  const wf=zip.folder('word')

function submitTpl(oldId){
  const nombre=v('tp0'),id=v('tp1').replace(/\s+/g,'_'),cat=v('tp2'),msg=rawV('tp3')
  if(!nombre||!id||!msg){alert('Completa todos los campos');return}
  var tpls=cargarTpls()
  const isNew=!oldId
  if(isNew){
    if(tpls.some(function(t){return t.id===id})){alert('Ya existe una plantilla con ese ID');return}
    tpls.push({id:id,nombre:nombre,categoria:cat,msg:msg})
    toast('Plantilla creada ✓')
  }else{
    const idx=tpls.findIndex(function(t){return t.id===oldId})
    if(idx>-1){tpls[idx]=Object.assign({},tpls[idx],{nombre:nombre,categoria:cat,msg:msg})}
    toast('Plantilla actualizada ✓')
  }
  guardarTpls(tpls);WA_TPLS=tpls;modal=null;draw()
}

function getCuotasManual(){
  const rows=document.querySelectorAll('.manual-row')
  const cuotas=[]
  rows.forEach(function(row){
    const inputs=row.querySelectorAll('input')
    if(inputs.length>=2){
      const label=inputs[0].value.trim()||'Cuota'
      const monto=parseFloat(inputs[1].value)||0
      const fecha=inputs[2]&&inputs[2].value||new Date().toISOString().split('T')[0]
      if(monto>0) cuotas.push({label:label,monto:monto,fecha:fecha})
    }
  })
  return cuotas
}

function htmlPortalCuentas(){
  const trabajosCl=data.trabajos.filter(function(t){return t.clienteId===user.clienteId})
  const idsTrab=trabajosCl.map(function(t){return t.id})
  const cuotasCl=data.cuotas.filter(function(c){return idsTrab.includes(c.trabajoId)})
  let h=htmlPortalHeader()
  // Summary KPIs
  const totalAcord=cuotasCl.reduce(function(s,c){return s+parseFloat(c.acordado||0)},0)
  const totalPag=cuotasCl.reduce(function(s,c){return s+parseFloat(c.pagado||0)},0)
  const totalSaldo=totalAcord-totalPag
  const vencidas=cuotasCl.filter(function(c){return cStat(c)==='vencido'})
  h+='<div class="kpis" style="margin-bottom:20px">'
    +'<div class="kpi"><div class="kpi-label">Total acordado</div><div class="kpi-value">$'+fmt(totalAcord)+'</div><div class="kpi-icon">📋</div></div>'
    +'<div class="kpi"><div class="kpi-label">Pagado</div><div class="kpi-value" style="color:var(--green)">$'+fmt(totalPag)+'</div><div class="kpi-icon">✅</div></div>'
    +'<div class="kpi"><div class="kpi-label">Saldo pendiente</div><div class="kpi-value" style="color:var(--amber)">$'+fmt(totalSaldo)+'</div><div class="kpi-icon">⏳</div></div>'
    +(vencidas.length?'<div class="kpi"><div class="kpi-label">Vencidas</div><div class="kpi-value" style="color:var(--red)">'+vencidas.length+'</div><div class="kpi-icon">⚠️</div></div>':'')
    +'</div>'
  h+='<div style="font-size:16px;font-weight:700;margin-bottom:14px">💳 Mis cuotas</div>'
  if(!cuotasCl.length){
    return h+'<div class="card"><p class="empty">No tienes cuotas registradas.</p></div>'
  }
  // Group by trabajo
  trabajosCl.forEach(function(t){
    const cs=cuotasCl.filter(function(c){return c.trabajoId===t.id})
      .sort(function(a,b){return new Date(a.fechaVencimiento)-new Date(b.fechaVencimiento)})
    if(!cs.length)return
    h+='<div style="font-size:13px;font-weight:700;color:var(--text2);margin:16px 0 8px">'+esc(t.titulo)+'</div>'
    cs.forEach(function(c){
      const st=cStat(c)
      const saldo=parseFloat(c.acordado||0)-parseFloat(c.pagado||0)
      const bgc={pagado:'#dcfce7',parcial:'#dbeafe',vencido:'#fee2e2',pendiente:'#fef3c7'}[st]||'#f9fafb'
      const bdc={pagado:'#bbf7d0',parcial:'#bfdbfe',vencido:'#fecaca',pendiente:'#fde68a'}[st]||'#e2e8f0'
      const stColor={pagado:'#15803d',parcial:'#1d4ed8',vencido:'#dc2626',pendiente:'#b45309'}[st]||'#64748b'
      h+='<div style="background:'+bgc+';border:1px solid '+bdc+';border-radius:10px;padding:14px 18px;margin-bottom:8px">'
        +'<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">'
        +'<div>'
        +'<div style="font-size:14px;font-weight:700">'+esc(c.label||'Cuota')+'</div>'
        +'<div style="font-size:12px;color:var(--text3);margin-top:2px">Vence: '+fmtDCorto(c.fechaVencimiento||'')+'</div>'
        +'</div>'
        +'<div style="text-align:right">'
        +'<div style="font-size:16px;font-weight:700">$'+fmt(c.acordado)+'</div>'
        +(parseFloat(c.pagado||0)>0?'<div style="font-size:11px;color:#15803d">✅ Pagado: $'+fmt(c.pagado)+'</div>':'')
        +(saldo>0&&st!=='pagado'?'<div style="font-size:11px;color:'+stColor+'">Saldo: $'+fmt(saldo)+'</div>':'')
        +'</div>'
        +'<span style="padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;background:'+stColor+'20;color:'+stColor+'">'+st.toUpperCase()+'</span>'
        +'</div>'
        // Abonos
        +(data.abonos.filter(function(a){return a.cuotaId===c.id}).length>0
          ?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid '+bdc+';display:flex;gap:10px;flex-wrap:wrap">'
          +data.abonos.filter(function(a){return a.cuotaId===c.id}).map(function(a){
            return'<span style="font-size:11px;color:#15803d;background:#f0fdf4;padding:3px 9px;border-radius:6px;border:1px solid #bbf7d0">🧾 $'+fmt(a.monto)+' · '+esc(a.fecha)+(a.comprobante?' · '+esc(a.comprobante):'')+'</span>'
          }).join('')+'</div>':''
        )
        +'</div>'
    })
  })
  return h
}

function gestionarPortalCliente(clienteId){
  const cl=data.clientes.find(function(x){return x.id===clienteId})
  if(!cl){toast('Cliente no encontrado','err');return}
  // Find existing portal user for this client
  const existing=(window._clientUsers||[]).find(function(u){return u.clienteId===clienteId})

    +'<button class="btn btn-p" onclick="submitPortalUser(\''+esc(d.clienteId)+'\',\''+esc(ex?ex.id:'')+'\')">'+(ex?'Actualizar':'Crear acceso')+'</button>'

async function submitPortalUser(clienteId, existingId){
  const usuario=v('pu0').trim()
  const password=v('pu1').trim()
  const activo=v('pu2')
  if(!usuario||!password){alert('Usuario y contraseña son obligatorios');return}
  if(password.length<4){alert('La contraseña debe tener al menos 4 caracteres');return}
  const cl=data.clientes.find(function(x){return x.id===clienteId})
  const rec={
    id:existingId||uid(),
    clienteId:clienteId,
    nombre:cl&&cl.nombre||'',
    usuario:usuario,
    password:password,
    role:'cliente',
    activo:activo
  }
  modal=null;syncMsg='Guardando usuario...';draw()
  const r=await apiPost({action:existingId?'actualizar':'insertar',tabla:'UsuariosCliente',fila:rec,id:rec.id})
  if(r&&r.ok){
    // Update local cache
    const cache=window._clientUsers||[]
    if(existingId){
      const idx=cache.findIndex(function(u){return u.id===existingId})
      if(idx>-1) cache[idx]=rec; else cache.push(rec)
    }else{
      cache.push(rec)
    }
    window._clientUsers=cache
    toast(existingId?'Usuario actualizado ✓':'Acceso al portal creado ✓')
    await loadData()
  }else{
    toast('Error: '+(r&&r.error||'Sin respuesta'),'err')
  }
}

async function eliminarPortalUser(userId){
  if(!confirm('¿Eliminar el acceso al portal de este cliente?'))return
  modal=null;draw()
  const r=await apiPost({action:'eliminar',tabla:'UsuariosCliente',id:userId})
  if(r&&r.ok){
    window._clientUsers=(window._clientUsers||[]).filter(function(u){return u.id!==userId})
    toast('Acceso eliminado ✓')
    await loadData()
  }else{
    toast('Error: '+(r&&r.error||''),'err')
  }
}

// Extrae HH:MM de cualquier formato de hora/fecha de Sheets
function cleanHora(h){
  if(!h||h==='')return'—'
  h=String(h).trim()
  // Already HH:MM or HH:MM:SS
  var m1=h.match(/^(\d{1,2}:\d{2})/)
  if(m1)return m1[1]
  // ISO with time: 1899-12-30T18:30:00 or 2026-04-01T18:30:00
  var m2=h.match(/T(\d{2}:\d{2})/)
  if(m2)return m2[1]
  // "Sat Dec 30 1899 18:30:00 GMT..." - any string with HH:MM:SS pattern
  var m3=h.match(/\b(\d{2}:\d{2}):\d{2}\b/)
  if(m3)return m3[1]
  // "Sat Dec 30 1899 18:30..." 
  var m4=h.match(/\b(\d{1,2}:\d{2})\b/)
  if(m4)return m4[1]
  return'—'
}

// Fecha de hoy en hora local (no UTC) para comparaciones correctas
function fechaHoyLocal(){
  var n=new Date()
  return[n.getFullYear(),String(n.getMonth()+1).padStart(2,'0'),String(n.getDate()).padStart(2,'0')].join('-')
}
